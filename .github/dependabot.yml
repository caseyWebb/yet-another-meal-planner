version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      cloudflare:
        patterns:
          - "@cloudflare/*"
          - "wrangler"
      mcp-runtime:
        patterns:
          - "@modelcontextprotocol/*"
          - "agents"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
