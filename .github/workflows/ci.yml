name: CI

# Upstream quality gate for the PUBLIC code repo: typecheck + both test suites on
# every push/PR. NO secrets and NO deploy — deployment is an operator action run
# from each operator's PRIVATE data repo (see .github/workflows/data-deploy.yml,
# the reusable workflow their thin deploy.yml caller invokes). Keeping this repo
# secret-free is the point of the consolidation: the data repo is the single
# control plane.

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  no-open-changes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: No unarchived OpenSpec changes
        run: |
          open=$(find openspec/changes -mindepth 1 -maxdepth 1 -type d ! -name archive | sort)
          if [ -n "$open" ]; then
            echo "Unarchived OpenSpec changes must be archived before merging:"
            echo "$open" | sed 's|openspec/changes/|  - |'
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # mise installs node + aube (and exposes aube/aubr/aubx); cache: true (default)
      # restores the mise tool cache. GITHUB_TOKEN avoids GitHub API rate limits when
      # the github:endevco/aube backend resolves the aube release.
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # Dependency cache: aube's content-addressable store. `aube ci` re-links from
      # cached tarballs instead of re-downloading on a warm run.
      - name: Cache aube store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.local/share/aube/store
          key: aube-store-${{ runner.os }}-${{ hashFiles('aube-lock.yaml') }}
          restore-keys: aube-store-${{ runner.os }}-

      - name: Install dependencies
        run: aube ci

      - name: Typecheck
        run: aubr typecheck

      - name: Test (Worker)
        run: aubr test

      - name: Test (build tooling)
        run: aubr test:tooling

      - name: Build admin app
        # packages/worker/assets/admin/ is a build artifact, NOT committed — the deploy
        # builds it fresh. Build it here too so a broken admin SPA build fails the `test`
        # job before any deploy can fire (build-automation). Vite from installed deps, no
        # network registry.
        run: aubr build:admin

      - name: Build member app
        # The member SPA builds into the same assets/ root (assets/admin/ is the admin
        # builder's subtree; each cleans only its own). Built on every CI run so a broken
        # SPA build fails the `test` job before any deploy can fire (build-automation).
        run: aubr build:app

      - name: Plugin builds from AGENT_INSTRUCTIONS.md
        # There is no committed bundle in this repo (the operator's deploy builds and
        # publishes it into their data-repo marketplace), so this guards that the persona
        # source still parses and maps to a well-formed skill set — the same validation
        # the deploy's build runs — catching a broken AGENT_INSTRUCTIONS.md before it
        # reaches any operator's publish.
        working-directory: packages/plugin
        run: node scripts/build-plugin.mjs --check

      - name: Authoring vault is current with src/vocab.js
        # The committed vault/ is generated from vault-template/ + src/vocab.js — its
        # Metadata Menu dropdowns ARE the vocabulary, so this gate proves the authoring
        # constraints can't drift from the server validator. Offline by design (the
        # vendored plugin binaries are fetched separately, never committed), so --check
        # needs no network — same drift discipline as the plugin/admin builds.
        working-directory: packages/worker
        run: node scripts/build-vault.mjs --check

      - name: Dependency licenses are AGPL-3.0-compatible
        # The deployed Worker bundles its PRODUCTION deps, so each must carry a license an
        # AGPL-3.0 work may redistribute (open-source-license). Fails on an unknown or
        # incompatible license before the dependency can land; dev/optional-only tooling is out
        # of scope. Pure-Node gate, unit-tested in tests/check-licenses.test.mjs.
        working-directory: packages/worker
        run: node scripts/check-licenses.mjs

  admin-ui:
    # BLOCKING browser-level gate for the operator admin panel (admin-ui-testing): Playwright
    # drives the real panel via a local `wrangler dev` (page objects per area, deterministic
    # seeded fixtures) and asserts every area's landmark + the dialog interactions. Functional
    # assertions only — no pixel baselines are committed, so nothing here fails on byte-level
    # image drift; visual regression review is human, over the screenshots this job publishes.
    # On a same-repo PR whose diff touches admin-UI paths, the publish step pushes the per-area
    # screenshots to the `admin-screenshots` branch and upserts ONE sticky PR comment embedding
    # them as commit-SHA-pinned raw.githubusercontent images (they render inline on github.com
    # and in the GitHub mobile app). Fork PRs get a read-only token, so the publish step skips
    # and the artifact upload below stays their surface. Runs on every PR/push (a Worker change
    # can break the panel's SSR); blocks merge once added to main's required status checks.
    runs-on: ubuntu-latest
    # One run per PR at a time (a superseded push's run is cancelled, so two runs of the same
    # PR never race the branch push or the comment upsert). Push events key on the sha — unique,
    # so pushes to main are never queued behind each other.
    concurrency:
      group: admin-ui-${{ github.event.pull_request.number || github.sha }}
      cancel-in-progress: true
    permissions:
      contents: write # push screenshots to the admin-screenshots branch (same-repo PRs only)
      pull-requests: write # upsert the sticky screenshot comment
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The publish step's path filter diffs the PR merge commit against its base (HEAD^1),
          # mirroring trigger-deploy's approach.
          fetch-depth: 2
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Cache aube store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.local/share/aube/store
          key: aube-store-${{ runner.os }}-${{ hashFiles('aube-lock.yaml') }}
          restore-keys: aube-store-${{ runner.os }}-
      - name: Install dependencies
        run: aube ci
      # The Chromium build @playwright/test pins, cached by lockfile hash (a Playwright bump
      # rotates the key). Runs in packages/worker: playwright is that workspace's dep, so its
      # bin is linked there (not at the monorepo root) in aube's pnpm-style layout.
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('aube-lock.yaml') }}
      - name: Install Playwright Chromium
        working-directory: packages/worker
        run: npx playwright install --with-deps chromium
      - name: Admin UI tests
        run: aubr test:admin
      - name: Detect admin-UI paths
        # Publish only when the PR actually touches what the panel renders or how it's tested:
        # the admin app, the shared UI package, the Worker's admin routes, the harness, or the
        # Playwright config. Same-repo PRs only — a fork's GITHUB_TOKEN can neither push the
        # branch nor comment, so the step degrades to the artifact upload below.
        id: adminpaths
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git diff --name-only HEAD^1 HEAD -- \
              packages/admin-app/ \
              packages/ui/ \
              packages/worker/src/admin/ \
              packages/worker/admin/visual/ \
              packages/worker/playwright.config.ts \
            | grep -q . \
            && echo "relevant=true" >> "$GITHUB_OUTPUT" \
            || echo "relevant=false" >> "$GITHUB_OUTPUT"
      - name: Publish screenshots to the PR
        if: steps.adminpaths.outputs.relevant == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        # Push this run's per-area PNGs to the dedicated orphan `admin-screenshots` branch under
        # pr-<n>/ (normal commits, never force-push — the sticky comment's SHA-pinned image URLs
        # must not dangle), then upsert the single marker-identified comment. SHA-pinned raw
        # URLs render via camo on web + mobile and are immune to branch-URL cache staleness.
        # The branch is orphaned (no shared history) and pruned per-PR on close (see
        # admin-screenshots-prune.yml); the operator can delete it any time.
        run: |
          set -euo pipefail
          BRANCH=admin-screenshots
          SHOTS=packages/worker/admin/visual/.screenshots
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Ensure the branch exists (an empty root commit), then work on it in a temp worktree.
          if ! git fetch origin "$BRANCH" 2>/dev/null; then
            EMPTY_TREE=$(git hash-object -t tree /dev/null)
            ROOT=$(git commit-tree "$EMPTY_TREE" -m "init admin-screenshots (admin-ui-testing)")
            # Tolerate losing the branch-creation race to a parallel run — the fetch below
            # picks up whichever root landed.
            git push origin "$ROOT:refs/heads/$BRANCH" || true
            git fetch origin "$BRANCH"
          fi
          git worktree add /tmp/shots FETCH_HEAD
          rm -rf "/tmp/shots/pr-$PR" && mkdir -p "/tmp/shots/pr-$PR"
          cp "$SHOTS"/*.png "/tmp/shots/pr-$PR/"
          git -C /tmp/shots add -A
          git -C /tmp/shots commit -m "admin-ui screenshots for PR #$PR @ $HEAD_SHA" || true
          # Push with a fetch-rebase retry: another PR's run can land on the shared branch
          # between our fetch and push (per-PR concurrency doesn't cover cross-PR contention),
          # and a non-fast-forward must not fail the required check. Directories are per-PR, so
          # the rebase is conflict-free by construction; the image SHA is taken from the final
          # pushed commit.
          for attempt in 1 2 3; do
            if git -C /tmp/shots push origin "HEAD:refs/heads/$BRANCH"; then
              break
            fi
            if [ "$attempt" = 3 ]; then
              echo "::error::could not push $BRANCH after 3 attempts"
              exit 1
            fi
            git -C /tmp/shots fetch origin "$BRANCH"
            git -C /tmp/shots rebase FETCH_HEAD || { git -C /tmp/shots rebase --abort; echo "::error::rebase onto $BRANCH failed"; exit 1; }
          done
          SHA=$(git -C /tmp/shots rev-parse HEAD)
          # One sticky comment, found by its hidden marker and edited in place — never a second.
          MARKER='<!-- admin-ui-screenshots -->'
          {
            echo "$MARKER"
            echo "### Admin UI screenshots"
            echo
            echo "_Captured by the \`admin-ui\` suite at \`$HEAD_SHA\` — this comment is updated in place on each push._"
            for f in "/tmp/shots/pr-$PR"/*.png; do
              n=$(basename "$f" .png)
              echo
              echo "<details><summary><b>$n</b></summary>"
              echo
              echo "![$n](https://raw.githubusercontent.com/$REPO/$SHA/pr-$PR/$n.png)"
              echo
              echo "</details>"
            done
          } > /tmp/comment.md
          # The screenshots are pushed and the artifact uploaded; the sticky comment is
          # reporting, not the gate. If the PR is already closed/merged (and possibly
          # locked — comments 403 on a locked thread) by the time this suite finishes,
          # skip the upsert with a warning instead of failing the job. On an OPEN PR an
          # upsert failure still fails loudly — that's a real publish regression.
          read -r STATE LOCKED < <(gh api "repos/$REPO/pulls/$PR" --jq '"\(.state) \(.locked)"')
          if [ "$STATE" != "open" ] || [ "$LOCKED" = "true" ]; then
            echo "::warning::PR #$PR is $STATE (locked=$LOCKED) — screenshots pushed to $BRANCH; skipping the sticky comment."
            exit 0
          fi
          find_comment() {
            gh api "repos/$REPO/issues/$PR/comments" --paginate \
              --jq "[.[] | select(.body | startswith(\"$MARKER\"))][0].id // empty"
          }
          CID=$(find_comment)
          # Best-effort dedup: re-query just before creating, in case a parallel run posted
          # the comment between our first lookup and now (PATCH of an existing id is safe).
          [ -n "$CID" ] || CID=$(find_comment)
          if [ -n "$CID" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$CID" -F body=@/tmp/comment.md > /dev/null
          else
            gh api "repos/$REPO/issues/$PR/comments" -F body=@/tmp/comment.md > /dev/null
          fi
      - name: Upload screenshots + report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: admin-ui
          path: |
            packages/worker/playwright-report/
            packages/worker/admin/visual/.results/
            packages/worker/admin/visual/.screenshots/
          retention-days: 14

  app-ui:
    # BLOCKING browser-level gate for the member app (app-ui-testing), mirroring admin-ui:
    # Playwright drives the real SPA served by a local `wrangler dev` (page objects, seeded
    # invite login, Worker-path passthrough) via `aubr test:app`. Functional assertions only
    # — no pixel baselines; visual review is human, over the screenshots this job publishes.
    # Same-repo PRs touching app-UI paths get their own sticky screenshot comment (its own
    # marker, its own pr-<n>-app/ directory on the shared screenshots branch — never
    # colliding with the admin job's pr-<n>/). Fork PRs degrade to the artifact upload.
    # Runs on every PR/push (a Worker change can break /api or the asset serving); blocks
    # merge once added to main's required status checks, and gates trigger-deploy below.
    runs-on: ubuntu-latest
    concurrency:
      group: app-ui-${{ github.event.pull_request.number || github.sha }}
      cancel-in-progress: true
    permissions:
      contents: write # push screenshots to the admin-screenshots branch (same-repo PRs only)
      pull-requests: write # upsert the sticky screenshot comment
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Cache aube store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.local/share/aube/store
          key: aube-store-${{ runner.os }}-${{ hashFiles('aube-lock.yaml') }}
          restore-keys: aube-store-${{ runner.os }}-
      - name: Install dependencies
        run: aube ci
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('aube-lock.yaml') }}
      - name: Install Playwright Chromium
        working-directory: packages/worker
        run: npx playwright install --with-deps chromium
      - name: App UI tests
        run: aubr test:app
      - name: Detect app-UI paths
        # Publish only when the PR touches what the member app renders or how it's tested:
        # the app/ui packages, the app harness, the /api + session Worker surface, or the
        # app Playwright config (design Decision 15). Same-repo PRs only — a fork's token
        # can neither push the branch nor comment.
        id: apppaths
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git diff --name-only HEAD^1 HEAD -- \
              packages/app/ \
              packages/ui/ \
              packages/worker/app/visual/ \
              packages/worker/src/api/ \
              packages/worker/src/session.ts \
              packages/worker/playwright.app.config.ts \
            | grep -q . \
            && echo "relevant=true" >> "$GITHUB_OUTPUT" \
            || echo "relevant=false" >> "$GITHUB_OUTPUT"
      - name: Publish screenshots to the PR
        if: steps.apppaths.outputs.relevant == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        # The admin-ui publish flow on the SAME orphan branch, under this suite's OWN
        # pr-<n>-app/ directory and its OWN sticky-comment marker — each job rm -rfs only
        # its own directory, and the fetch-rebase retry absorbs cross-job races.
        run: |
          set -euo pipefail
          BRANCH=admin-screenshots
          SHOTS=packages/worker/app/visual/.screenshots
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git fetch origin "$BRANCH" 2>/dev/null; then
            EMPTY_TREE=$(git hash-object -t tree /dev/null)
            ROOT=$(git commit-tree "$EMPTY_TREE" -m "init admin-screenshots (admin-ui-testing)")
            git push origin "$ROOT:refs/heads/$BRANCH" || true
            git fetch origin "$BRANCH"
          fi
          git worktree add /tmp/shots FETCH_HEAD
          rm -rf "/tmp/shots/pr-$PR-app" && mkdir -p "/tmp/shots/pr-$PR-app"
          cp "$SHOTS"/*.png "/tmp/shots/pr-$PR-app/"
          git -C /tmp/shots add -A
          git -C /tmp/shots commit -m "app-ui screenshots for PR #$PR @ $HEAD_SHA" || true
          for attempt in 1 2 3; do
            if git -C /tmp/shots push origin "HEAD:refs/heads/$BRANCH"; then
              break
            fi
            if [ "$attempt" = 3 ]; then
              echo "::error::could not push $BRANCH after 3 attempts"
              exit 1
            fi
            git -C /tmp/shots fetch origin "$BRANCH"
            git -C /tmp/shots rebase FETCH_HEAD || { git -C /tmp/shots rebase --abort; echo "::error::rebase onto $BRANCH failed"; exit 1; }
          done
          SHA=$(git -C /tmp/shots rev-parse HEAD)
          MARKER='<!-- app-ui-screenshots -->'
          {
            echo "$MARKER"
            echo "### App UI screenshots"
            echo
            echo "_Captured by the \`app-ui\` suite at \`$HEAD_SHA\` — this comment is updated in place on each push._"
            for f in "/tmp/shots/pr-$PR-app"/*.png; do
              n=$(basename "$f" .png)
              echo
              echo "<details><summary><b>$n</b></summary>"
              echo
              echo "![$n](https://raw.githubusercontent.com/$REPO/$SHA/pr-$PR-app/$n.png)"
              echo
              echo "</details>"
            done
          } > /tmp/comment.md
          # Same closed/locked degrade as the admin-ui publish step above: the comment is
          # reporting, not the gate — skip with a warning on a non-open or locked PR.
          read -r STATE LOCKED < <(gh api "repos/$REPO/pulls/$PR" --jq '"\(.state) \(.locked)"')
          if [ "$STATE" != "open" ] || [ "$LOCKED" = "true" ]; then
            echo "::warning::PR #$PR is $STATE (locked=$LOCKED) — screenshots pushed to $BRANCH; skipping the sticky comment."
            exit 0
          fi
          find_comment() {
            gh api "repos/$REPO/issues/$PR/comments" --paginate \
              --jq "[.[] | select(.body | startswith(\"$MARKER\"))][0].id // empty"
          }
          CID=$(find_comment)
          [ -n "$CID" ] || CID=$(find_comment)
          if [ -n "$CID" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$CID" -F body=@/tmp/comment.md > /dev/null
          else
            gh api "repos/$REPO/issues/$PR/comments" -F body=@/tmp/comment.md > /dev/null
          fi
      - name: Upload screenshots + report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-ui
          path: |
            packages/worker/playwright-report/
            packages/worker/app/visual/.results/
            packages/worker/app/visual/.screenshots/
          retention-days: 14

  satellite-version:
    # Version single-source-of-truth gate (build-automation): packages/satellite/package.json
    # `version` is the satellite's one version — the value the running satellite reports as
    # `satellite_version` on every ingest batch. A PR that touches the satellite OR the shared
    # contract it imports (a contract change reshapes the
    # satellite) MUST bump that version to a strictly-greater semver, or this gate fails. PR-only
    # (a push to main has no base to diff against) and bot-exempt (an automated dependency PR
    # can't bump the version) in one guard, mirroring pr-checklist.yml. Reads git only — the
    # built-in GITHUB_TOKEN, never DATA_REPO_ACTIONS_TOKEN — and never commits a bump: the author
    # bumps it in the PR. Blocks merge once added to main's required status checks (an operator
    # repo-settings step, as with the other gates).
    if: github.event_name == 'pull_request' && !endsWith(github.event.pull_request.user.login, '[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so the PR base ref is present for the path diff and the base
          # package.json read (the HEAD^ trick the other jobs use gives the merge commit's
          # first parent, not the base tip we compare versions against).
          fetch-depth: 0

      - name: Require a satellite version bump when the satellite or contract changed
        env:
          BASE: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch --quiet origin "$BASE"
          # Three-dot: the changes this PR introduces since the merge-base with the base branch.
          changed=$(git diff --name-only "origin/$BASE...HEAD" -- packages/satellite packages/contract)
          if [ -z "$changed" ]; then
            echo "No packages/satellite or packages/contract changes in this PR; satellite version bump not required."
            exit 0
          fi
          echo "Satellite/contract files changed in this PR:"
          echo "$changed" | sed 's/^/  - /'
          if ! base_pkg="$(git show "origin/$BASE:packages/satellite/package.json" 2>/dev/null)"; then
            echo "packages/satellite/package.json does not exist on base $BASE — the satellite package is new on this branch (e.g. the scraper→satellite rename), so there is no base version to compare and the bump gate does not apply. The push-side detect-satellite-version job publishes the first release on merge."
            exit 0
          fi
          head_pkg="$(cat packages/satellite/package.json)" || { echo "::error::packages/satellite/package.json missing in this PR — the satellite package must keep its version manifest."; exit 1; }
          # Dependency-free strictly-greater semver compare (plain MAJOR.MINOR.PATCH).
          BASE_PKG="$base_pkg" HEAD_PKG="$head_pkg" node -e '
            const parse = (json, where) => {
              let v;
              try { v = JSON.parse(json).version; } catch { v = undefined; }
              const m = /^(\d+)\.(\d+)\.(\d+)/.exec(String(v ?? "").trim());
              if (!m) {
                console.error(`::error::Cannot read a MAJOR.MINOR.PATCH version from the ${where} packages/satellite/package.json (got ${JSON.stringify(v)}).`);
                process.exit(1);
              }
              return { v, t: [Number(m[1]), Number(m[2]), Number(m[3])] };
            };
            const base = parse(process.env.BASE_PKG, "base");
            const head = parse(process.env.HEAD_PKG, "head");
            console.log(`Base version: ${base.v}`);
            console.log(`Head version: ${head.v}`);
            const [b, h] = [base.t, head.t];
            const gt = h[0] > b[0] || (h[0] === b[0] && (h[1] > b[1] || (h[1] === b[1] && h[2] > b[2])));
            if (!gt) {
              console.error(`::error::This PR touches packages/satellite/** or packages/contract/** but packages/satellite/package.json version (${head.v}) is not strictly greater than the base (${base.v}). Bump the "version" field — it is the version the running satellite reports as satellite_version.`);
              process.exit(1);
            }
            console.log(`Satellite version bumped ${base.v} -> ${head.v} — OK`);
          '

  detect-satellite-version:
    # Push-side complement to the PR-only `satellite-version` gate: on a merge to main, detect whether
    # packages/satellite/package.json `version` changed across THIS push. If it did, the release-satellite
    # job below auto-publishes that version (build-automation) — no tag push, no commit-back.
    # Push-only: a PR/dispatch has nothing to auto-publish (the PR gate owns PRs).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so the push pre-image (github.event.before) is reachable

      - name: Detect a satellite version change
        id: detect
        # Baseline is the push PRE-IMAGE (github.event.before), NOT HEAD^ — so a rebase-merge or a
        # multi-commit push whose bump isn't in the tip commit is still caught (HEAD^ would silently
        # miss it → nothing publishes → unrecoverable). Edges degrade to changed=true (the release's
        # idempotence guard prevents an actual double-publish): an all-zero `before` (branch just
        # created), an unresolvable `before` (a force-push rewrote history), or an absent/unparseable
        # old package.json (first import).
        env:
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          new="$(node -p "require('./packages/satellite/package.json').version")"
          ZERO="0000000000000000000000000000000000000000"
          if [ -z "${BEFORE:-}" ] || [ "$BEFORE" = "$ZERO" ] || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            old="" # no reachable baseline → force changed=true
          elif old_json="$(git show "${BEFORE}:packages/satellite/package.json" 2>/dev/null)"; then
            old="$(printf '%s' "$old_json" | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" 2>/dev/null || echo "")"
          else
            old="" # file absent/unparseable at the baseline → force changed=true
          fi
          if [ "$new" != "$old" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$new" >> "$GITHUB_OUTPUT"
          echo "satellite version: before='${BEFORE:-}' old='${old}' new='${new}'"

  release-satellite:
    # Auto-publish the satellite release when the version changed on this push to main. Calls the
    # reusable satellite-release.yml INLINE (a GITHUB_TOKEN-pushed tag can't retrigger on: push, so we
    # never push a tag and wait for a tag-trigger). Gated on green CI (test + no-open-changes) so a
    # broken build never publishes; the satellite's own package is covered by `test` (workspace-aware),
    # so admin-ui — the Worker admin-panel browser gate, unrelated to the satellite — is deliberately
    # NOT in this gate. Separate control plane from the Worker deploy: this fires on a satellite
    # version change (not on Worker paths) and never dispatches the data-repo deploy.
    needs: [detect-satellite-version, test, no-open-changes]
    if: github.event_name == 'push' && needs.detect-satellite-version.outputs.changed == 'true'
    permissions:
      contents: write # the reusable workflow creates the Release + its satellite-v<version> tag
      packages: write # …and pushes the multi-arch image to GHCR
    uses: ./.github/workflows/satellite-release.yml
    with:
      version: ${{ needs.detect-satellite-version.outputs.version }}

  trigger-deploy:
    # Auto-trigger the data-repo deploy on Worker-relevant changes to main.
    # Only fires on push (not PRs or workflow_dispatch) — the push trigger above
    # is already filtered to branches: [main], so no extra branch guard needed.
    # Gated on the CI jobs (incl. BOTH browser gates — admin-ui and app-ui) so a deploy
    # never fires when tests are red.
    if: github.event_name == 'push'
    needs: [no-open-changes, test, admin-ui, app-ui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - name: Check for Worker- or plugin-relevant changes
        id: changed
        # Worker paths (src/ — incl. the admin routes under src/admin/ — wrangler.jsonc,
        # deps) plus the two SPAs the deploy builds and serves (packages/app/,
        # packages/admin-app/, packages/ui/) plus the plugin sources
        # (AGENT_INSTRUCTIONS.md, the builder) — a persona-only change must republish the
        # skills, and the deploy is Worker-first so it redeploys the (unchanged) Worker
        # before publishing, which is safe. assets/ is built at deploy time, not committed.
        run: |
          git diff --name-only HEAD^ HEAD -- packages/worker/src/ packages/worker/wrangler.jsonc packages/contract/ packages/app/ packages/admin-app/ packages/ui/ package.json aube-lock.yaml pnpm-workspace.yaml packages/plugin/AGENT_INSTRUCTIONS.md packages/plugin/scripts/build-plugin.mjs \
            | grep -q . \
            && echo "relevant=true" >> "$GITHUB_OUTPUT" \
            || echo "relevant=false" >> "$GITHUB_OUTPUT"

      - name: Trigger Deploy Worker
        if: steps.changed.outputs.relevant == 'true'
        env:
          GH_TOKEN: ${{ secrets.DATA_REPO_ACTIONS_TOKEN }}
        # Pin --ref so gh doesn't resolve the data repo's default branch
        # (the defaultBranchRef GraphQL lookup needs Contents:read on the token);
        # the deploy always targets main, so this keeps DATA_REPO_ACTIONS_TOKEN
        # scoped to just Actions:write (+ mandatory Metadata).
        run: gh workflow run deploy.yml --repo caseyWebb/yet-another-meal-planner-deployment --ref main
