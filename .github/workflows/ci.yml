name: CI

# Upstream quality gate for the PUBLIC code repo: typecheck + both test suites on
# every push/PR. NO secrets and NO deploy — deployment is an operator action run
# from each operator's PRIVATE data repo (see .github/workflows/data-deploy.yml,
# the reusable workflow their thin deploy.yml caller invokes). Keeping this repo
# secret-free is the point of the consolidation: the data repo is the single
# control plane.

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  no-open-changes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: No unarchived OpenSpec changes
        run: |
          open=$(find openspec/changes -mindepth 1 -maxdepth 1 -type d ! -name archive | sort)
          if [ -n "$open" ]; then
            echo "Unarchived OpenSpec changes must be archived before merging:"
            echo "$open" | sed 's|openspec/changes/|  - |'
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # mise installs node + aube (and exposes aube/aubr/aubx); cache: true (default)
      # restores the mise tool cache. GITHUB_TOKEN avoids GitHub API rate limits when
      # the github:endevco/aube backend resolves the aube release.
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # Dependency cache: aube's content-addressable store. `aube ci` re-links from
      # cached tarballs instead of re-downloading on a warm run.
      - name: Cache aube store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.local/share/aube/store
          key: aube-store-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: aube-store-${{ runner.os }}-

      - name: Install dependencies
        run: aube ci

      - name: Typecheck
        run: aubr typecheck

      - name: Test (Worker)
        run: aubr test

      - name: Test (build tooling)
        run: aubr test:tooling

      - name: Build admin panel islands
        # admin/dist/ is a build artifact, NOT committed (the esbuild bundles embed
        # environment-specific module paths, so a committed copy isn't reproducible) — the
        # deploy builds it fresh. Build it here too so a broken island (an esbuild bundling
        # failure) fails CI before the deploy. esbuild-only, no network registry.
        working-directory: packages/worker
        run: node scripts/build-admin.mjs

      - name: Plugin builds from AGENT_INSTRUCTIONS.md
        # There is no committed bundle in this repo (the operator's deploy builds and
        # publishes it into their data-repo marketplace), so this guards that the persona
        # source still parses and maps to a well-formed skill set — the same validation
        # the deploy's build runs — catching a broken AGENT_INSTRUCTIONS.md before it
        # reaches any operator's publish.
        working-directory: packages/worker
        run: node scripts/build-plugin.mjs --check

      - name: Authoring vault is current with src/vocab.js
        # The committed vault/ is generated from vault-template/ + src/vocab.js — its
        # Metadata Menu dropdowns ARE the vocabulary, so this gate proves the authoring
        # constraints can't drift from the server validator. Offline by design (the
        # vendored plugin binaries are fetched separately, never committed), so --check
        # needs no network — same drift discipline as the plugin/admin builds.
        working-directory: packages/worker
        run: node scripts/build-vault.mjs --check

      - name: Dependency licenses are AGPL-3.0-compatible
        # The deployed Worker bundles its PRODUCTION deps, so each must carry a license an
        # AGPL-3.0 work may redistribute (open-source-license). Fails on an unknown or
        # incompatible license before the dependency can land; dev/optional-only tooling is out
        # of scope. Pure-Node gate, unit-tested in tests/check-licenses.test.mjs.
        working-directory: packages/worker
        run: node scripts/check-licenses.mjs

  admin-visual:
    # Browser-level visual + smoke aid for the operator admin panel: drives the real panel via a
    # local `wrangler dev` and uploads per-area screenshots (+ pixel diffs vs the committed
    # baselines) as PR artifacts. NON-BLOCKING (continue-on-error) — the baselines are a dev
    # bootstrap and CI's pinned Chromium differs, so this surfaces diffs without gating; the
    # vitest `test` job is the functional gate. See admin/visual/README.md to promote it to a gate.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Cache aube store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.local/share/aube/store
          key: aube-store-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: aube-store-${{ runner.os }}-
      - name: Install dependencies
        run: aube ci
      # Installs the Chromium build @playwright/test pins (+ its OS deps). This differs from the
      # browser the bootstrap baselines were captured with, hence the non-blocking job above.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Admin visual + smoke tests
        run: aubr test:admin
      - name: Upload screenshots + report
        if: ${{ always() }}
        # NOTE: version-tagged (not SHA-pinned like the actions above) — pin to a SHA to match the
        # repo's convention when convenient.
        uses: actions/upload-artifact@v4
        with:
          name: admin-visual
          path: |
            packages/worker/playwright-report/
            packages/worker/admin/visual/.results/
          retention-days: 14

  trigger-deploy:
    # Auto-trigger the data-repo deploy on Worker-relevant changes to main.
    # Only fires on push (not PRs or workflow_dispatch) — the push trigger above
    # is already filtered to branches: [main], so no extra branch guard needed.
    # Gated on both CI jobs so a deploy never fires when tests are red.
    if: github.event_name == 'push'
    needs: [no-open-changes, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - name: Check for Worker- or plugin-relevant changes
        id: changed
        # Worker paths (src/ — incl. the admin SSR + island source under src/admin/ —
        # wrangler.jsonc, deps, the admin island builder) plus the plugin sources
        # (AGENT_INSTRUCTIONS.md, the builder) — a persona-only change must republish the
        # skills, and the deploy is Worker-first so it redeploys the (unchanged) Worker
        # before publishing, which is safe. admin/dist/ is built at deploy time, not committed.
        run: |
          git diff --name-only HEAD^ HEAD -- packages/worker/src/ packages/worker/wrangler.jsonc packages/contract/ package.json package-lock.json packages/worker/AGENT_INSTRUCTIONS.md packages/worker/scripts/build-plugin.mjs packages/worker/scripts/build-admin.mjs \
            | grep -q . \
            && echo "relevant=true" >> "$GITHUB_OUTPUT" \
            || echo "relevant=false" >> "$GITHUB_OUTPUT"

      - name: Trigger Deploy Worker
        if: steps.changed.outputs.relevant == 'true'
        env:
          GH_TOKEN: ${{ secrets.DATA_REPO_ACTIONS_TOKEN }}
        # Pin --ref so gh doesn't resolve the data repo's default branch
        # (the defaultBranchRef GraphQL lookup needs Contents:read on the token);
        # the deploy always targets main, so this keeps DATA_REPO_ACTIONS_TOKEN
        # scoped to just Actions:write (+ mandatory Metadata).
        run: gh workflow run deploy.yml --repo caseyWebb/groceries-agent-data --ref main
