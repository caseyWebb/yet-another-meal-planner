name: CI

# Upstream quality gate for the PUBLIC code repo: typecheck + both test suites on
# every push/PR. NO secrets and NO deploy — deployment is an operator action run
# from each operator's PRIVATE data repo (see .github/workflows/data-deploy.yml,
# the reusable workflow their thin deploy.yml caller invokes). Keeping this repo
# secret-free is the point of the consolidation: the data repo is the single
# control plane.

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (Worker)
        run: npm test

      - name: Test (build tooling)
        run: npm run test:tooling

      - name: Plugin skills are current with AGENT_INSTRUCTIONS.md
        # The committed marketplace plugin's skills/ are generated from
        # AGENT_INSTRUCTIONS.md — guard against drift. The manifest's userConfig
        # default (worker_url) is operator-specific, so the comparison is scoped
        # to skills/ (the part derived from the source doc).
        run: |
          node scripts/build-plugin.mjs --out /tmp/plugin-check --mcp-url __ci__
          diff -r plugin/grocery-agent/skills /tmp/plugin-check/skills
