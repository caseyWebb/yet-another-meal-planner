name: scraper-release

# Publish the home-network walled-source scraper (packages/scraper) as a container image on a
# scoped `scraper-v*` tag (build-automation). Independent of the Worker deploy control plane: a
# scraper tag builds + pushes the image to GHCR and cuts a GitHub Release; it never redeploys the
# Worker, and a Worker deploy never publishes a scraper image. Uses the built-in GITHUB_TOKEN
# (packages: write) — NO new stored Actions secret, preserving the public repo's secret-free rule.

on:
  push:
    tags: ["scraper-v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without the scraper-v prefix), for a manual run."
        type: string
        required: true

permissions:
  contents: write # create the GitHub Release
  packages: write # push the image to GHCR

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        # Registers the arm64 emulation handlers so the amd64 runner can cross-build the
        # linux/arm64 variant. version-tagged to match the docker/* actions below.
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        # A Buildx builder that can emit a multi-arch manifest list in one push.
        uses: docker/setup-buildx-action@v3

      - name: Derive version + targeted contract version
        id: v
        # The scraper's build version comes from the tag (scraper-v1.2.3 → 1.2.3); the recipe
        # CONTRACT version it targets is read from the shared contract source so the image embeds
        # both — the running scraper reports them to the Worker for the admin skew view.
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#scraper-v}"
          fi
          contract="$(grep -oE 'CONTRACT_VERSION = "[^"]+"' packages/contract/src/ingest.ts | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "contract=$contract" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/groceries-scraper" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        # version-tagged (not SHA-pinned) — pin to a SHA to match the repo convention when convenient.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the scraper image
        # Context is the REPO ROOT (the scraper imports the @grocery-agent/contract workspace
        # package), with the package's own Dockerfile. The image embeds its build + contract version.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/scraper/Dockerfile
          # Multi-arch: the image runs natively on x86 home servers (amd64) AND Apple-Silicon
          # home hosts (arm64) — so the browser tier's Chromium is native, not emulated. The
          # Playwright base is multi-arch and the Node toolchain is arch-agnostic, so this just
          # cross-builds the arm64 variant under QEMU and pushes a manifest list under each tag.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.v.outputs.image }}:${{ steps.v.outputs.version }}
            ${{ steps.v.outputs.image }}:latest
          build-args: |
            SCRAPER_VERSION=${{ steps.v.outputs.version }}
            CONTRACT_VERSION=${{ steps.v.outputs.contract }}

      - name: Create the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: scraper v${{ steps.v.outputs.version }}
          generate_release_notes: true
          body: |
            Home-network walled-source recipe scraper — container image.

            **Image:** `${{ steps.v.outputs.image }}:${{ steps.v.outputs.version }}`
            **Targets recipe contract:** `${{ steps.v.outputs.contract }}`

            Pull and run (see `packages/scraper/README.md` and `docker-compose.example.yml`):

            ```
            docker pull ${{ steps.v.outputs.image }}:${{ steps.v.outputs.version }}
            ```
