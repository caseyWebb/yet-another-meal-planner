# Reusable workflow: revoke a member — delete their allowlist entry + invite code
# from the operator's TENANT_KV, so they can no longer authorize and their issued
# OAuth token stops resolving. A DATA repo (private) calls this from a thin
# workflow_dispatch caller — see that repo's .github/workflows/revoke.yml. Run it
# from the data repo (private), never the public code repo/fork.
#
# No GitHub App key. The TENANT_KV namespace is addressed by BINDING, resolved from
# the operator's wrangler.jsonc (checked out here) — no separate tenant_kv_id. To
# also delete their data, remove users/<username>/ from the data repo manually.
name: data-revoke

on:
  workflow_call:
    inputs:
      username:
        description: "Username to revoke."
        required: true
        type: string
      invite_code:
        description: "Their invite code to delete (optional — only needed if it was never used/rotated)."
        required: false
        type: string
      cloudflare_account_id:
        description: "Cloudflare account id. Only needed if the API token spans multiple accounts."
        required: false
        type: string
    secrets:
      CLOUDFLARE_API_TOKEN:
        description: "Cloudflare token with Workers + KV edit."
        required: true

jobs:
  revoke:
    runs-on: ubuntu-latest
    steps:
      # The data repo — for its wrangler.jsonc, so KV is addressed by binding.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Remove from KV (allowlist + invite)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare_account_id }}
          U: ${{ inputs.username }}
          CODE: ${{ inputs.invite_code }}
        run: |
          # KV by --binding TENANT_KV (from the checked-out wrangler.jsonc). See the
          # onboard workflow's VERIFY note (zero-config-deploy task 4).
          npx --yes wrangler kv key delete --binding TENANT_KV --remote "tenant:${U}" || true
          if [ -n "$CODE" ]; then
            npx --yes wrangler kv key delete --binding TENANT_KV --remote "invite:${CODE}" || true
          fi

      - name: Remove from DATA_KV (profile + session state)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare_account_id }}
          U: ${{ inputs.username }}
        run: |
          # Per-tenant profile bundle and session-state keys (DATA_KV).
          npx --yes wrangler kv key delete --binding DATA_KV --remote "profile:${U}" || true
          npx --yes wrangler kv key delete --binding DATA_KV --remote "state:${U}:pantry" || true
          npx --yes wrangler kv key delete --binding DATA_KV --remote "state:${U}:meal_plan" || true
          npx --yes wrangler kv key delete --binding DATA_KV --remote "state:${U}:grocery_list" || true

      - name: Summary
        env:
          U: ${{ inputs.username }}
        run: echo "Revoked \`${U}\` — TENANT_KV allowlist + invite and DATA_KV profile/session keys removed; their token no longer resolves. Delete \`users/${U}/\` from the data repo manually if you want their GitHub-backed history (cooking_log, notes, store_notes) gone too." >> "$GITHUB_STEP_SUMMARY"
