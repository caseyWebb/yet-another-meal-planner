# Reusable workflow: revoke a member — delete their allowlist entry + invite code
# from the operator's TENANT_KV, so they can no longer authorize and their issued
# OAuth token stops resolving. A DATA repo (private) calls this from a thin
# workflow_dispatch caller — see that repo's .github/workflows/revoke.yml. Run it
# from the data repo (private), never the public code repo/fork.
#
# No GitHub App key. TENANT_KV and the D1 `DB` are addressed by BINDING, resolved
# from the operator's wrangler.jsonc (checked out here) — no separate ids. This now
# purges the member's domain data too (D1: profile, session, cooking log, attributed
# notes), since that data moved off GitHub/KV into D1.
name: data-revoke

on:
  workflow_call:
    inputs:
      username:
        description: "Username to revoke."
        required: true
        type: string
      invite_code:
        description: "Their invite code to delete (optional — only needed if it was never used/rotated)."
        required: false
        type: string
      cloudflare_account_id:
        description: "Cloudflare account id. Only needed if the API token spans multiple accounts."
        required: false
        type: string
    secrets:
      CLOUDFLARE_API_TOKEN:
        description: "Cloudflare token with Workers + KV + D1 edit."
        required: true

jobs:
  revoke:
    runs-on: ubuntu-latest
    steps:
      # The data repo — for its wrangler.jsonc, so KV is addressed by binding.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Remove from KV (allowlist + invite)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare_account_id }}
          U: ${{ inputs.username }}
          CODE: ${{ inputs.invite_code }}
        run: |
          # KV by --binding TENANT_KV (from the checked-out wrangler.jsonc). See the
          # onboard workflow's VERIFY note (zero-config-deploy task 4).
          npx --yes wrangler kv key delete --binding TENANT_KV --remote "tenant:${U}" || true
          if [ -n "$CODE" ]; then
            npx --yes wrangler kv key delete --binding TENANT_KV --remote "invite:${CODE}" || true
          fi

      - name: Remove from D1 (profile + session + cooking log + notes)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare_account_id }}
          U: ${{ inputs.username }}
        run: |
          # Per-tenant domain data lives in D1 now (not DATA_KV). Purge every
          # tenant-scoped table plus the member's attributed notes. Addressed by the
          # `DB` binding from the checked-out wrangler.jsonc (same as the deploy's
          # `wrangler d1 migrations apply DB`).
          for t in profile brand_prefs kitchen_equipment staples overlay ready_to_eat stockup pantry meal_plan grocery_list cooking_log; do
            npx --yes wrangler d1 execute DB --remote --command "DELETE FROM ${t} WHERE tenant = '${U}'" || true
          done
          npx --yes wrangler d1 execute DB --remote --command "DELETE FROM recipe_notes WHERE author = '${U}'" || true
          npx --yes wrangler d1 execute DB --remote --command "DELETE FROM store_notes WHERE author = '${U}'" || true

      - name: Summary
        env:
          U: ${{ inputs.username }}
        run: echo "Revoked \`${U}\` — TENANT_KV allowlist + invite removed and their D1 domain data purged (profile, session, cooking log, attributed notes); their token no longer resolves. Recipes are shared corpus and are not tenant-owned, so nothing recipe-side is deleted." >> "$GITHUB_STEP_SUMMARY"
