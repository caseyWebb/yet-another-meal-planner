name: CLA Assistant

# Records contributor agreement to CLA.md (open-source-license, the AGPL + dual-license grant).
# On each PR the bot checks whether every commit author has signed; if not, it comments asking
# them to, and a contributor signs by replying with the sign phrase below. Signatures are stored
# in this repo at signatures/version1/cla.json. The maintainer and bots are allowlisted.
#
# NOTE: this third-party action is pinned to a version TAG, while the rest of the repo pins by
# commit SHA (see ci.yml). Pin contributor-assistant/github-action to a SHA when convenient.
# NOTE: signatures are stored on `main`; if main is branch-protected against direct pushes, store
# them on a dedicated branch or a separate repo instead (the action's `branch` / remote-* inputs).

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Least-privilege: comment on PRs, set the CLA status check, and commit the signatures file.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        # Act only on the sign/recheck phrases or a PR event — ignore unrelated issue comments.
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: 'https://github.com/caseyWebb/groceries-agent/blob/main/CLA.md'
          path-to-signatures: 'signatures/version1/cla.json'
          branch: 'main'
          # The maintainer and bots never sign. `*[bot]` covers Dependabot and friends.
          allowlist: 'caseyWebb,*[bot]'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-notsigned-prcomment: 'Thanks for the contribution! Before it can be merged, please read the [Contributor License Agreement](https://github.com/caseyWebb/groceries-agent/blob/main/CLA.md) and sign it by posting a comment with exactly:<br/><br/>`I have read the CLA Document and I hereby sign the CLA`<br/><br/>You only need to do this once — it covers your future contributions too.'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✅'
          # Keep signature commits out of CI — they touch only the signatures file.
          create-file-commit-message: 'chore(cla): initialize signature store [skip ci]'
          signed-commit-message: 'chore(cla): record CLA signature [skip ci]'
