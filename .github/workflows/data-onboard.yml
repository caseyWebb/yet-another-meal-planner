# Reusable workflow: onboard a member — mint their invite code + allowlist entry
# in the operator's TENANT_KV. A DATA repo (created from groceries-agent-data-template,
# PRIVATE) calls this from a thin workflow_dispatch caller — see that repo's
# .github/workflows/onboard.yml. Running it from the data repo (private) is the
# whole point: the run + its summary — which carry the invite code — are visible
# only to the operator. NEVER run onboarding from the public code repo or a fork of
# it: a fork of a public repo is itself public, so its Actions logs (and any
# operator-supplied invite_code dispatch input) leak the code to the world.
#
# KV-only: no checkout, no GitHub App key, no wrangler.jsonc. The namespace is
# addressed by id (tenant_kv_id) so this never depends on the operator's config
# living in some other repo. The member's users/<username>/ subtree is created
# lazily on their first write (the commit engine creates files at any path).
name: data-onboard

on:
  workflow_call:
    inputs:
      username:
        description: "New member's username (their tenant id + users/<username> subtree)."
        required: true
        type: string
      invite_code:
        description: "Invite code to mint (blank → a random one is generated)."
        required: false
        type: string
      tenant_kv_id:
        description: "The TENANT_KV namespace id (from wrangler.jsonc / the Cloudflare dashboard)."
        required: true
        type: string
      worker_host:
        description: "Connector host for the summary URL, e.g. grocery.example.com. Blank → resolve from worker_name, else placeholder."
        required: false
        type: string
      worker_name:
        description: "Worker name, to auto-resolve the host via the Cloudflare custom-domain API. Blank → skip."
        required: false
        type: string
      cloudflare_account_id:
        description: "Cloudflare account id. Only needed if the API token spans multiple accounts."
        required: false
        type: string
    secrets:
      CLOUDFLARE_API_TOKEN:
        description: "Cloudflare token with Workers + KV edit."
        required: true

jobs:
  onboard:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve invite code
        id: code
        env:
          IN: ${{ inputs.invite_code }}
        run: |
          code="$IN"
          if [ -z "$code" ]; then code="$(openssl rand -hex 8)"; fi
          echo "value=$code" >> "$GITHUB_OUTPUT"

      - name: Allowlist + mint invite (KV)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare_account_id }}
          KVID: ${{ inputs.tenant_kv_id }}
          U: ${{ inputs.username }}
          CODE: ${{ steps.code.outputs.value }}
        run: |
          # Usernames are case-insensitive: store the canonical lowercase form so the
          # directory key (tenant:<id>), the stored id, the invite target, and the
          # Worker's users/<id>/ path prefix all agree. The Worker lowercases on read
          # too (src/tenant.ts normalizeTenantId), so an already-lowercase data subtree
          # is never split by a mixed-case onboard input.
          u="${U,,}"
          npx --yes wrangler kv key put --namespace-id="$KVID" --remote "tenant:${u}" "{\"id\":\"${u}\"}"
          npx --yes wrangler kv key put --namespace-id="$KVID" --remote "invite:${CODE}" "${u}"

      - name: Resolve connector host (optional, Cloudflare custom domain)
        id: host
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GIVEN_HOST: ${{ inputs.worker_host }}
          NAME: ${{ inputs.worker_name }}
          ACCT_IN: ${{ inputs.cloudflare_account_id }}
        run: |
          host="$GIVEN_HOST"
          # Auto-resolve only when no host was given but a worker name was.
          if [ -z "$host" ] && [ -n "$NAME" ]; then
            acct="$ACCT_IN"
            if [ -z "$acct" ]; then
              acct=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                "https://api.cloudflare.com/client/v4/accounts" | jq -r '.result[0].id // empty')
            fi
            if [ -n "$acct" ]; then
              host=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                "https://api.cloudflare.com/client/v4/accounts/$acct/workers/domains" \
                | jq -r --arg n "$NAME" '[.result[]? | select(.service==$n)][0].hostname // empty')
            fi
          fi
          if [ -z "$host" ]; then host="<your-worker-host>"; fi
          echo "value=$host" >> "$GITHUB_OUTPUT"

      - name: Summary
        env:
          U: ${{ inputs.username }}
          CODE: ${{ steps.code.outputs.value }}
          HOST: ${{ steps.host.outputs.value }}
        run: |
          u="${U,,}"  # canonical lowercase id — matches the KV/subtree/grant form
          {
            echo "## Onboarded \`${u}\`"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Invite code | \`${CODE}\` |"
            echo "| Connector URL | \`https://${HOST}/mcp\` |"
            echo ""
            echo "Send them the invite code + connector URL, and \`AGENT_INSTRUCTIONS.md\` to paste into their Claude.ai Project. They enter the code at the \`/authorize\` page Claude.ai sends them to, then run their Kroger consent at \`https://${HOST}/oauth/init?tenant=${u}\`. Their \`users/${u}/\` subtree is created automatically on their first write (e.g. setting their store)."
            echo ""
            echo "> This run executed in your **private** data repo, so the invite code above is visible only to you (and any data-repo collaborators). Rotate it by re-running with a new code. Never run onboarding from the public code repo or a fork — its logs are world-readable."
          } >> "$GITHUB_STEP_SUMMARY"
