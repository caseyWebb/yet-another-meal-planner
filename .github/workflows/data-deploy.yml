# Reusable workflow: deploy the grocery-mcp Worker. A DATA repo (PRIVATE) calls
# this from a thin workflow_dispatch caller — see that repo's .github/workflows/
# deploy.yml. The data repo is the operator's single control plane: it holds the
# Actions secrets (CLOUDFLARE_API_TOKEN + optional Kroger creds) and the operator's
# wrangler config. The public code repo holds NO secrets and is never forked for ops.
#
# Source vs config: the Worker SOURCE comes from this code repo (pinned by
# code_ref — DRY, updates propagate via @main); the operator's wrangler.jsonc
# lives in THEIR data repo and is overlaid onto the source before deploy.
#
# Zero-config (see the zero-config-deploy change):
#  - KV namespace ids and the D1 database id are auto-provisioned by `wrangler deploy`
#    (the template config ships id-less bindings) and PINNED BACK into the data repo so
#    redeploys reuse them. D1 schema migrations (migrations/d1/*.sql) are then applied
#    via `wrangler d1 migrations apply DB --remote`, before the .mjs data-backfill runner.
#  - DATA_OWNER/DATA_REPO are intuited from `github.repository`; DATA_REF defaults
#    to main — injected as --var, not hand-set in wrangler.jsonc.
#  - The GitHub App private key STAYS a manual Cloudflare secret (never in a repo).
#    The lower-value Kroger creds are optionally set here from data-repo secrets.
name: data-deploy

on:
  workflow_call:
    inputs:
      code_ref:
        description: Ref of caseyWebb/groceries-agent to deploy the Worker source from.
        type: string
        default: main
      config_path:
        description: Path, in the DATA repo, to the operator's wrangler.jsonc.
        type: string
        default: wrangler.jsonc
    secrets:
      CLOUDFLARE_API_TOKEN:
        description: "Cloudflare token with Workers + KV + D1 edit."
        required: true
      KROGER_CLIENT_ID:
        description: "Optional: Kroger client id; when set, the deploy puts it as a Worker secret."
        required: false
      KROGER_CLIENT_SECRET:
        description: "Optional: Kroger client secret; set alongside KROGER_CLIENT_ID."
        required: false

# No `permissions:` block here on purpose: a reusable workflow that REQUESTS more
# than the caller grants fails at startup. The pin-back step needs `contents: write`,
# which the CALLER grants (the template deploy.yml does); if it doesn't, the pin-back
# degrades gracefully (warns, doesn't fail the deploy). So existing callers without a
# permissions block keep working — their explicit-id configs make the pin-back a no-op.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # The caller's repo (the data repo) — for the operator's wrangler.jsonc, and
      # the target of the KV-id pin-back commit.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # This code repo — the Worker source + build deps. Into _code/ so nothing is
      # ever committed back to the data repo (except the pinned ids, below).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: caseyWebb/groceries-agent
          ref: ${{ inputs.code_ref }}
          path: _code

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      # DATA_OWNER/DATA_REPO are literally the repo this workflow runs in.
      - name: Derive data-repo coordinates
        id: coords
        run: |
          echo "owner=${GITHUB_REPOSITORY%/*}" >> "$GITHUB_OUTPUT"
          echo "repo=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci
        working-directory: _code

      - name: Typecheck
        run: npm run typecheck
        working-directory: _code

      - name: Test
        run: npm test
        working-directory: _code

      # Assemble the deployed config by MERGING code-level keys (triggers,
      # compatibility_*, main, observability) from the code repo with the operator's
      # owned keys (vars, KV ids, name, routes) — instead of the old wholesale `cp`
      # overlay that dropped code-level config (and silently the flyer cron). The merge
      # strips the code repo's vars/KV ids (the maintainer's) so they never reach an
      # operator. See scripts/merge-wrangler-config.mjs.
      - name: Merge wrangler config (code-level + operator-owned)
        run: node _code/scripts/merge-wrangler-config.mjs merge "${{ inputs.config_path }}" _code/wrangler.jsonc

      # Deploy. --var injects the intuited data-repo coords into the Worker's vars
      # (the Worker has no Actions context, so they're baked at deploy). KV bindings
      # with no id are auto-provisioned here.
      - name: Deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: _code
          command: >-
            deploy
            --var DATA_OWNER:${{ steps.coords.outputs.owner }}
            --var DATA_REPO:${{ steps.coords.outputs.repo }}
            --var DATA_REF:main

      # The Worker exists now, so secrets can be put. Only set Kroger creds if the
      # operator provided them as repo secrets — never clobber dashboard-set values
      # with empties. The App private key is intentionally NOT handled here.
      - name: Set Kroger secrets (only if provided)
        working-directory: _code
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          KID: ${{ secrets.KROGER_CLIENT_ID }}
          KSECRET: ${{ secrets.KROGER_CLIENT_SECRET }}
        run: |
          if [ -n "$KID" ] && [ -n "$KSECRET" ]; then
            printf '%s' "$KID"     | npx --yes wrangler secret put KROGER_CLIENT_ID
            printf '%s' "$KSECRET" | npx --yes wrangler secret put KROGER_CLIENT_SECRET
          else
            echo "Kroger creds not supplied as repo secrets — leaving any dashboard-set values untouched."
          fi

      # Pin auto-provisioned KV namespace ids AND the D1 database id back into the
      # operator's config so the NEXT deploy reuses the same namespaces/database. Under
      # the merge, _code/wrangler.jsonc is the FULL deployed config (code-level +
      # operator), so a wholesale copy-back would re-bloat the operator's slim config
      # with code-level keys — instead we surgically patch only the provisioned ids (by
      # binding) into the operator's config. The same `pin` invocation covers both binding
      # types (merge-wrangler-config.mjs pinBindingIds + bindingIdsChanged).
      #
      # Assumes `wrangler deploy` writes the provisioned ids into _code/wrangler.jsonc
      # in place; if a wrangler version stops doing so, fetch ids via `wrangler kv
      # namespace list` / `wrangler d1 list` instead (the pin step's input is the only
      # thing that changes).
      - name: Pin auto-provisioned KV + D1 ids back to the data repo
        env:
          CONFIG: ${{ inputs.config_path }}
        run: |
          node _code/scripts/merge-wrangler-config.mjs pin _code/wrangler.jsonc "$CONFIG"
          if git diff --quiet -- "$CONFIG"; then
            echo "No KV/D1 id changes to persist."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "$CONFIG"
            git commit -m "chore(deploy): pin auto-provisioned KV + D1 ids"
            if ! git push; then
              echo "::warning::Could not push pinned KV/D1 ids (the deploy caller needs 'permissions: contents: write'). The deploy succeeded; paste the ids from wrangler.jsonc manually, or grant the permission so it auto-pins next time."
            fi
          fi

      # Apply pending D1 SCHEMA migrations (migrations/d1/*.sql) to the now-provisioned
      # database. This is the native track — `wrangler d1 migrations apply` tracks applied
      # files in D1's own `d1_migrations` table (created on first apply), distinct from the
      # `.mjs` runner's `migrations:applied` KV ledger below. Runs AFTER the pin (so the
      # database_id is in the operator config) and BEFORE the data backfill (so its tables
      # exist). A no-op when nothing is pending. The operator's CLOUDFLARE_API_TOKEN must
      # carry D1 edit — an under-scoped token surfaces as a clear failure here.
      - name: Apply D1 schema migrations
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: _code
          command: d1 migrations apply DB --remote

      # (The one-time KV/GitHub→D1 backfill migrations have been applied and retired —
      # there is no `.mjs` data-migration step anymore. Schema lives in the D1-native
      # step above; the recipe index is projected below.)

      # Project the recipe index into the D1 `recipes` table immediately after deploy
      # so the Worker can serve list_recipes without waiting for a recipe push. Reads
      # the D1 database id from the operator's wrangler.jsonc (pinned back above).
      - name: Validate recipes + project the D1 index
        run: node _code/scripts/build-indexes.mjs --root .
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
