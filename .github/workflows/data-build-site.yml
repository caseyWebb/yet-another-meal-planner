# Reusable workflow: build a DATA repo's public cookbook site and deploy it to
# that repo's GitHub Pages. Called by a data repo's thin .github/workflows/build-site.yml.
# Billing/runners/Pages are the CALLER's (the data repo owner). The data repo is
# PRIVATE, so publishing public Pages from it needs GitHub Pro. The site renders
# ONLY recipes/ — never users/<username>/ — so no personal data is exposed.
name: data-build-site

on:
  workflow_call:
    inputs:
      code_ref:
        description: Ref of caseyWebb/groceries-agent to take the build scripts from.
        type: string
        default: main

# Capped by the caller's grant; the caller workflow must grant the same.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # The build scripts + mise.toml live in _code/, but the build steps run from the
    # data-repo root (`--root .`). Point mise at _code/mise.toml so node/aube resolve
    # from any cwd.
    env:
      MISE_GLOBAL_CONFIG_FILE: ${{ github.workspace }}/_code/mise.toml
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: caseyWebb/groceries-agent
          ref: ${{ inputs.code_ref }}
          path: _code

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          github_token: ${{ github.token }}

      - name: Cache aube store
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.local/share/aube/store
          key: aube-store-${{ runner.os }}-${{ hashFiles('_code/package-lock.json') }}
          restore-keys: aube-store-${{ runner.os }}-

      - name: Install build deps
        run: aube ci
        working-directory: _code

      # Indexes first (the site reads _indexes/components.json), then the site.
      - name: Build indexes + site
        run: |
          node _code/scripts/build-indexes.mjs --root .
          node _code/scripts/build-site.mjs --root . --out site

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
