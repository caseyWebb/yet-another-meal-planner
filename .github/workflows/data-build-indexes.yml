# Reusable workflow: validate a DATA repo's recipes/ and project the recipe index
# into D1. A data repo (created from groceries-agent-data-template) calls this — see
# that repo's thin .github/workflows/build-indexes.yml. Billing/runners are the
# CALLER's (the data repo owner), never this repo's. The build scripts live ONLY
# here; the data repo carries no copy. `code_ref` pins which version of the scripts
# to run.
#
# The recipe index is the D1 `recipes` table now (d1-recipe-index), not a committed
# _indexes/recipes.json — so this job VALIDATES + PROJECTS to D1 and commits no
# index file. (_indexes/ stays in the data repo for the site's components.json,
# which a different build target owns.) CLOUDFLARE_API_TOKEN is required for the
# projection: with it (plus the DB database id pinned in the data repo's
# wrangler.jsonc by the first deploy), build-indexes replaces the table wholesale;
# without it (or before first provision) the script warns and skips the projection,
# so validation still runs.
name: data-build-indexes

on:
  workflow_call:
    inputs:
      code_ref:
        description: Ref of caseyWebb/groceries-agent to take the build scripts from.
        type: string
        default: main
    secrets:
      CLOUDFLARE_API_TOKEN:
        description: "Cloudflare token with D1 write access. When set (and the DB database id is pinned in wrangler.jsonc), the recipe index is projected into the D1 `recipes` table; when absent, the projection warns and skips."
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Build scripts + mise.toml live in _code/, but the build step runs from the
    # data-repo root (`--root .`). Point mise at _code/mise.toml so node/aube resolve
    # from any cwd.
    env:
      MISE_GLOBAL_CONFIG_FILE: ${{ github.workspace }}/_code/mise.toml
    steps:
      # The caller's repo (the data repo) — its recipes/ are the build input.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # This code repo — for the build scripts + their deps. Goes in _code/ so it
      # is never committed to the data repo.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: caseyWebb/groceries-agent
          ref: ${{ inputs.code_ref }}
          path: _code

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          github_token: ${{ github.token }}

      - name: Cache aube store
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.local/share/aube/store
          key: aube-store-${{ runner.os }}-${{ hashFiles('_code/package-lock.json') }}
          restore-keys: aube-store-${{ runner.os }}-

      - name: Install build deps
        run: aube ci
        working-directory: _code

      # `--root .` builds THIS workspace (the data repo), not _code. With
      # CLOUDFLARE_API_TOKEN set, the script projects the recipe index into the D1
      # `recipes` table (reading the DB database id from the data repo's
      # wrangler.jsonc); otherwise it warns and skips the projection.
      - name: Validate recipes + project the D1 index
        run: node _code/scripts/build-indexes.mjs --root .
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
