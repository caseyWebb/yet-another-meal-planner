# Reusable workflow: regenerate a DATA repo's _indexes/ from its recipes/ and
# publish the recipe index to DATA_KV. A data repo (created from
# groceries-agent-data-template) calls this — see that repo's thin
# .github/workflows/build-indexes.yml. Billing/runners are the CALLER's (the data
# repo owner), never this repo's. The build scripts live ONLY here; the data repo
# carries no copy. `code_ref` pins which version of the scripts to run.
#
# CLOUDFLARE_API_TOKEN is optional: when passed (via `secrets: inherit` in the
# caller), the build script also publishes the index to DATA_KV. When absent, only
# the JSON file is written and committed (the old behaviour).
name: data-build-indexes

on:
  workflow_call:
    inputs:
      code_ref:
        description: Ref of caseyWebb/groceries-agent to take the build scripts from.
        type: string
        default: main
    secrets:
      CLOUDFLARE_API_TOKEN:
        description: "Cloudflare token with KV write access. Optional: when set, the index is published to DATA_KV after being written to _indexes/."
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the regenerated _indexes back to the data repo
    steps:
      # The caller's repo (the data repo) — its recipes/ are the build input.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # This code repo — for the build scripts + their deps. Goes in _code/ so it
      # is never committed to the data repo.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: caseyWebb/groceries-agent
          ref: ${{ inputs.code_ref }}
          path: _code

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install build deps
        run: npm ci
        working-directory: _code

      # `--root .` builds THIS workspace (the data repo), not _code.
      # When CLOUDFLARE_API_TOKEN is set, the script auto-publishes to DATA_KV.
      - name: Validate + regenerate indexes
        run: node _code/scripts/build-indexes.mjs --root .
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Commit regenerated indexes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _indexes
          if git diff --cached --quiet; then
            echo "Indexes unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "Regenerate indexes [skip ci]"
          git push
