# Reusable workflow: build a self-hoster's grocery-agent plugin bundle with THEIR
# connector URL baked in, and publish it as a downloadable artifact they upload to
# claude.ai (Customize -> upload a custom plugin file). No marketplace, no fork — the
# operator's data repo calls this and downloads the artifact; they can forward the
# file to friends (no GitHub account needed). Build-only: NO secrets. Billing/runners
# are the CALLER's (the data repo owner).
#
# Why this exists: the published marketplace plugin bakes the OPERATOR's Worker URL
# and isn't open for signups, and claude.ai won't override a plugin's connector URL at
# install time (no userConfig support — verified). So self-hosters mint their own
# baked bundle here instead of forking the code repo. The skills are URL-free and
# identical to the marketplace build; only the baked .mcp.json URL differs.
name: data-build-plugin

on:
  workflow_call:
    inputs:
      mcp_url:
        description: The self-hoster's grocery-mcp connector URL (e.g. https://grocery-mcp.<you>.workers.dev/mcp).
        type: string
        required: true
      code_ref:
        description: Ref of caseyWebb/groceries-agent to build from.
        type: string
        default: main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: caseyWebb/groceries-agent
          ref: ${{ inputs.code_ref }}
          # FULL history: build-plugin's resolveVersion() derives the plugin version
          # from `git rev-list --count HEAD`. A shallow clone returns 1, which would
          # pin every build to 0.1.1 and break claude.ai's strictly-greater update gate.
          fetch-depth: 0

      # node only — this build is dependency-free (below), so install_args: node skips
      # pulling aube, and there is no aube store cache. The code repo is checked out at
      # the root here (no _code/), so mise.toml is found normally.
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: node
          github_token: ${{ github.token }}

      # No dependency install: build-plugin.mjs imports only Node built-ins
      # (dependency-free), unlike build-indexes/build-site. Keeps this build fast.
      - name: Build plugin bundle (operator URL baked in)
        run: node scripts/build-plugin.mjs --mcp-url "${{ inputs.mcp_url }}" --out dist/bundle

      # Upload the bundle DIRECTORY, not a pre-made zip: downloading the artifact yields
      # a .zip whose ROOT is the bundle contents (.claude-plugin/, .mcp.json, skills/) —
      # exactly the layout claude.ai accepts for an uploaded plugin file. A pre-zip would
      # download double-wrapped. include-hidden-files is REQUIRED, or the dotfiles
      # .claude-plugin/ and .mcp.json are silently dropped (upload-artifact@v4 default).
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: grocery-agent-plugin
          path: dist/bundle
          include-hidden-files: true

      - name: How to install
        run: |
          {
            echo "## grocery-agent plugin built"
            echo ""
            echo "Connector URL baked in: \`${{ inputs.mcp_url }}\`"
            echo ""
            echo "1. Download the **grocery-agent-plugin** artifact from this run (a \`.zip\`)."
            echo "2. claude.ai -> Customize -> upload a custom plugin file -> pick that \`.zip\`."
            echo "3. Open a **fresh chat**, then complete the OAuth invite-code flow at \`/authorize\`."
            echo ""
            echo "Sharing with a friend: send them the downloaded \`.zip\` + their invite code — no GitHub account needed. On a later update, re-run this workflow and re-send the file."
          } >> "$GITHUB_STEP_SUMMARY"
