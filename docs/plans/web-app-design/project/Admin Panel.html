  /* Always import */
  .ai-list { display: flex; flex-direction: column; gap: .4rem; }
  .ai-row { display: flex; align-items: center; gap: .7rem; padding: .55rem .8rem; border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--c-surface); box-shadow: var(--shadow-xs); transition: opacity .15s; }
  .ai-row.off { opacity: .55; }
  .ai-kind { display: inline-flex; width: 28px; height: 28px; align-items: center; justify-content: center; border-radius: 50%; flex: 0 0 auto; }
  .ai-kind.member { background: var(--c-info-bg); color: var(--c-info); }
  .ai-kind.automated { background: var(--c-purple-bg); color: var(--c-purple); }
  .ai-id { flex: 1; display: flex; flex-direction: column; gap: .05rem; min-width: 0; }
  .ai-label { font-weight: 500; font-size: .88rem; color: var(--c-ink); }
  .ai-addr { font-family: var(--font-mono); font-size: .74rem; overflow: hidden; text-overflow: ellipsis; }
  .ai-switch { display: inline-flex; align-items: center; }

  /* ── Insights (popularity leaderboards) ── */
  .stat-value-sm { font-size: 1.05rem; line-height: 1.25; letter-spacing: -.01em; }
  .ins-window { margin: 0; }
  .insights .status-head { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1.4rem; }

  /* GitHub-style cooking-activity heatmap */
  .cal-wrap { border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--c-surface); box-shadow: var(--shadow-xs); padding: 1rem 1.1rem; overflow-x: auto; margin-bottom: .5rem; }
  .cal-figure { display: grid; grid-template-columns: auto 1fr; grid-template-rows: auto auto; column-gap: 6px; row-gap: 4px; width: max-content; --cal-cell: 12px; --cal-gap: 3px; }
  .cal-corner { grid-column: 1; grid-row: 1; }
  .cal-months { grid-column: 2; grid-row: 1; display: grid; grid-template-columns: repeat(53, var(--cal-cell)); column-gap: var(--cal-gap); }
  .cal-month { font-size: .66rem; color: var(--muted-foreground); white-space: nowrap; overflow: visible; text-align: left; }
  .cal-days { grid-column: 1; grid-row: 2; display: grid; grid-template-rows: repeat(7, var(--cal-cell)); row-gap: var(--cal-gap); }
  .cal-days span { font-size: .62rem; color: var(--muted-foreground); line-height: var(--cal-cell); text-align: right; }
  .cal-cells { grid-column: 2; grid-row: 2; display: grid; grid-template-rows: repeat(7, var(--cal-cell)); grid-auto-flow: column; grid-auto-columns: var(--cal-cell); gap: var(--cal-gap); }
  .cal-cell { width: var(--cal-cell, 12px); height: var(--cal-cell, 12px); border-radius: 2px; background: var(--muted); }
  .cal-cell.empty { background: transparent; }
  .cal-cell.lvl-0 { background: color-mix(in oklch, var(--muted) 70%, var(--c-surface)); }
  .cal-cell.lvl-1 { background: #f6d2b0; }
  .cal-cell.lvl-2 { background: #f0a868; }
  .cal-cell.lvl-3 { background: #e8843f; }
  .cal-cell.lvl-4 { background: #b4552b; }
  .cal-cell.out { opacity: .2; }
  .cal-legend { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-top: .8rem; }
  .cal-scale { display: inline-flex; align-items: center; gap: 3px; }
  .cal-scale .cal-cell { width: 11px; height: 11px; }

  .ins-sortbar { display: flex; align-items: center; gap: .7rem; margin: .25rem 0 1.4rem; }
  .ins-sort-label { text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
  .ins-sort { margin: 0; }
  .ins-gap { margin-top: 2rem; }

  .ins-board { display: flex; flex-direction: column; gap: .4rem; }
  .ins-row { display: flex; align-items: center; gap: .9rem; width: 100%; text-align: left; background: var(--c-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-xs); padding: .7rem .9rem; font: inherit; }
  button.ins-row { cursor: pointer; transition: border-color .12s, box-shadow .12s; }
  button.ins-row:hover, .ins-row.clickable:hover { border-color: color-mix(in oklch, var(--accent) 45%, var(--border)); box-shadow: var(--shadow-sm); }
  .ins-row.clickable { cursor: pointer; }
  .ins-row.clickable:focus-visible { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 30%, transparent); }

  .ins-rank { flex: 0 0 auto; width: 1.7rem; height: 1.7rem; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: .82rem; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--c-soft); background: color-mix(in oklch, var(--muted) 55%, transparent); }
  .ins-rank.top { background: color-mix(in oklch, var(--accent) 18%, transparent); color: #b4552b; }

  .ins-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: .4rem; }
  .ins-titlerow { display: flex; align-items: baseline; gap: .55rem; flex-wrap: nowrap; min-width: 0; overflow: hidden; }
  .ins-title { font-weight: 600; font-size: .92rem; color: var(--c-ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 0 1 auto; }
  .ins-sub { font-size: .78rem; white-space: nowrap; flex: 0 0 auto; }
  .ins-count { font-variant-numeric: tabular-nums; }
  .ins-titlerow .badge { text-transform: none; }
  .ins-feed-tag { display: inline-flex; align-items: center; gap: .25rem; font-size: .72rem; color: #b4552b; background: color-mix(in oklch, var(--accent) 12%, transparent); border-radius: 999px; padding: .03rem .45rem; }

  .ins-bar { height: .4rem; background: var(--muted); border-radius: 999px; overflow: hidden; }
  .ins-bar-fill { display: block; height: 100%; border-radius: 999px; transition: width .35s ease; }
  .ins-bar-fill.combo { background: var(--accent); }
  .ins-bar-fill.fav { background: #d6336c; }
  .ins-bar-fill.cook { background: #e8843f; }

  .ins-metrics { flex: 0 0 auto; display: flex; flex-direction: column; align-items: flex-end; gap: .15rem; min-width: 8.5rem; }
  .ins-metric { display: inline-flex; align-items: center; gap: .3rem; font-size: .8rem; color: var(--c-mid); font-variant-numeric: tabular-nums; }
  .ins-metric svg { color: var(--c-faint); }
  .ins-metric-val { font-weight: 600; color: var(--c-ink); }
  .ins-metric-label { color: var(--muted-foreground); font-size: .74rem; }
  .ins-metric.active .ins-metric-val { color: #b4552b; }
  .ins-metric.active svg { color: #e8843f; }
  .ins-last { margin-top: .05rem; white-space: nowrap; }
  @media (max-width: 640px) { .ins-metrics { min-width: 0; } .ins-last { display: none; } }

  /* Expandable source rows */
  .ins-source-wrap { border-radius: var(--radius-lg); }
  .ins-source-wrap .ins-row.ins-source { width: 100%; }
  .ins-source-wrap.open .ins-row.ins-source { border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom-color: transparent; }
  .ins-caret { flex: 0 0 auto; color: var(--muted-foreground); transition: transform .15s; margin-left: -.2rem; }
  .ins-caret.up { transform: rotate(180deg); }
  .ins-feed-tag[role="link"] { cursor: pointer; }
  .ins-feed-tag[role="link"]:hover { background: color-mix(in oklch, var(--accent) 22%, transparent); }
  .ins-sub-recipes { display: flex; flex-direction: column; border: 1px solid var(--border); border-top: 0; border-bottom-left-radius: var(--radius-lg); border-bottom-right-radius: var(--radius-lg); background: color-mix(in oklch, var(--muted) 25%, var(--c-surface)); overflow: hidden; }
  .ins-subrecipe { display: flex; align-items: center; gap: .7rem; width: 100%; text-align: left; background: none; border: 0; border-top: 1px solid var(--border); font: inherit; cursor: pointer; padding: .5rem .9rem .5rem 3.1rem; transition: background .12s; }
  .ins-subrecipe:hover { background: color-mix(in oklch, var(--accent) 7%, var(--c-surface)); }
  .ins-subrecipe-title { font-size: .85rem; font-weight: 500; color: var(--c-ink); flex: 0 1 auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ins-subrecipe-cuisine { flex: 1; }
  .ins-subrecipe-metrics { display: inline-flex; gap: .7rem; flex: 0 0 auto; }
  .ins-submetric { display: inline-flex; align-items: center; gap: .25rem; font-size: .78rem; color: var(--c-mid); font-variant-numeric: tabular-nums; }
  .ins-submetric svg { color: var(--c-faint); }
  .ins-subrecipe-go { color: var(--muted-foreground); flex: 0 0 auto; }
  .ins-subrecipe:hover .ins-subrecipe-go { color: var(--accent); }

  /* ── Group labels ── */
  .group-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; color: var(--c-soft); font-weight: 600; margin: 1.5rem 0 .65rem; }

  /* ── Job / dependency list items ── */
  .job-list { gap: .6rem; }
  .job-item { align-items: flex-start; background: var(--c-surface); box-shadow: var(--shadow-xs); }
  .job-item > figure { margin-top: .05rem; }
  .job-item > aside { align-self: flex-start; margin-top: .1rem; }
  .job-item.fail { border-color: color-mix(in oklch, var(--destructive) 35%, var(--border)); background: color-mix(in oklch, var(--destructive) 3%, var(--c-surface)); }
  .job-name { font-family: var(--font-mono); font-size: .9rem; font-weight: 500; color: var(--c-ink); }
  .job-meta { color: var(--muted-foreground); font-size: .8rem; line-height: 1.5; }
  .job-sep { opacity: .5; margin: 0 .3rem; }
  .txt-bad { color: var(--c-fail); font-weight: 500; }

  .sglyph { display: inline-flex; }
  .sglyph svg { width: 20px; height: 20px; }
  .sglyph.ok { color: var(--c-ok-dot); }
  .sglyph.fail { color: var(--c-fail); }
  .sglyph.never { color: var(--c-warn-dot); }
  .dep-ico { display: inline-flex; color: var(--muted-foreground); }
  .dep-ico svg { width: 19px; height: 19px; }

  /* Per-job summary count chips. */
  .jstats { display: flex; flex-wrap: wrap; gap: .35rem .4rem; margin-top: .6rem; }

  /* Per-job uptime sparkline (run-outcome time series). */
  .uptime { margin-top: .7rem; }
  .uptime-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: .35rem; }
  .uptime-cap { font-size: .72rem; text-transform: uppercase; letter-spacing: .045em; color: var(--c-soft); font-weight: 600; }
  .uptime-pct { font-size: .74rem; color: var(--muted-foreground); font-variant-numeric: tabular-nums; }
  .uptime-track { display: flex; gap: 2px; align-items: stretch; height: 22px; }
  .uptime-bar { flex: 1 1 0; min-width: 0; border-radius: 1px; background: var(--c-ok-dot); transition: opacity .12s; border: 0; padding: 0; appearance: none; cursor: pointer; }
  .uptime-bar:hover { opacity: .65; }
  .uptime-bar:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .uptime-bar.fail { background: var(--c-fail); }
  .uptime-bar.degraded { background: var(--c-warn-dot); }
  .uptime-bar.none { background: var(--c-line2); }
  .uptime-axis { display: flex; justify-content: space-between; margin-top: .25rem; font-size: .68rem; color: var(--c-faint); }
  .jstat { display: inline-flex; align-items: center; gap: .35rem; background: color-mix(in oklch, var(--muted) 55%, transparent); border: 1px solid var(--border); border-radius: 999px; padding: .12rem .55rem; font-size: .72rem; }
  .jstat-k { color: var(--muted-foreground); }
  .jstat-v { font-family: var(--font-mono); font-weight: 600; color: var(--c-ink); }

  /* ── Global corner health indicator ── */
  .health-dock { position: fixed; right: 1.25rem; bottom: 1.25rem; z-index: 60; display: flex; flex-direction: column; align-items: flex-end; gap: .6rem; }
  .health-pill { display: inline-flex; align-items: center; gap: .55rem; background: var(--c-surface); border: 1px solid var(--border); border-radius: 999px; padding: .5rem .85rem .5rem .8rem; box-shadow: var(--shadow-md); cursor: pointer; font: inherit; font-size: .82rem; font-weight: 500; color: var(--c-ink); transition: box-shadow .15s, border-color .15s; }
  .health-pill:hover { box-shadow: var(--shadow-lg); }
  .health-pill.fail { border-color: color-mix(in oklch, var(--destructive) 35%, var(--border)); }
  .health-pill .hp-caret { color: var(--muted-foreground); transition: transform .15s; }
  .health-pill .hp-caret.up { transform: rotate(180deg); }
  .hp-count { background: var(--c-fail); color: var(--c-surface); border-radius: 999px; font-size: .7rem; font-weight: 600; min-width: 1.15rem; height: 1.15rem; display: inline-flex; align-items: center; justify-content: center; padding: 0 .3rem; }

  .pulse-dot { position: relative; width: .55rem; height: .55rem; border-radius: 50%; flex: 0 0 auto; }
  .pulse-dot.ok { background: var(--c-ok-dot); }
  .pulse-dot.fail { background: var(--c-fail); }
  .pulse-dot::after { content: ""; position: absolute; inset: 0; border-radius: 50%; background: inherit; animation: hpulse 2.4s ease-out infinite; }
  @keyframes hpulse { 0% { transform: scale(1); opacity: .55; } 70%, 100% { transform: scale(2.8); opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { .pulse-dot::after { animation: none; } }

  .health-pop { width: 19rem; background: var(--c-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: .9rem; font-size: .82rem; animation: hp-rise .14s ease-out; }
  @keyframes hp-rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .hp-head { display: flex; align-items: center; gap: .5rem; padding-bottom: .65rem; border-bottom: 1px solid var(--c-line); }
  .hp-head .status-word { font-size: .95rem; }
  .hp-ts { margin-left: auto; }
  .hp-rollup { display: flex; align-items: center; gap: .5rem; margin: .7rem 0 .3rem; }
  .hp-roll-ico { display: inline-flex; color: var(--c-ok-dot); }
  .hp-roll-ico svg { width: 17px; height: 17px; }
  .hp-fail-list { list-style: none; margin: .3rem 0 0; padding: .5rem .6rem; background: color-mix(in oklch, var(--destructive) 5%, var(--c-surface)); border: 1px solid color-mix(in oklch, var(--destructive) 25%, var(--border)); border-radius: var(--radius-md); display: flex; flex-direction: column; gap: .35rem; }
  .hp-fail-list li { display: flex; align-items: center; gap: .45rem; }
  .hp-fail-name { font-family: var(--font-mono); font-size: .8rem; }
  .hp-fail-list .muted { margin-left: auto; }
  .hp-deps { display: flex; flex-direction: column; gap: .4rem; margin: .75rem 0; padding-top: .7rem; border-top: 1px solid var(--c-line); }
  .hp-dep { display: flex; align-items: center; gap: .5rem; }
  .hp-dep-name { font-family: var(--font-mono); font-size: .8rem; color: var(--c-body); }
  .hp-dep .status-word { margin-left: auto; font-size: .8rem; }
  .hp-link { width: 100%; justify-content: center; gap: .35rem; }

  @media (max-width: 640px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .health-pop { width: 16rem; }
  }

  /* ── Discovery: pushed-candidate origin badge + push-satisfied acquire ── */
  .dc-origin { display: inline-flex; align-items: center; gap: .3rem; flex: 0 0 auto; font-size: .68rem; font-weight: 600; letter-spacing: .01em; color: var(--accent); border: 1px solid color-mix(in oklch, var(--accent) 40%, var(--border)); background: color-mix(in oklch, var(--accent) 9%, transparent); border-radius: 999px; padding: .05rem .5rem; white-space: nowrap; }
  .dc-origin svg { flex: 0 0 auto; }
  .pl-stage.push .pl-node { background: color-mix(in oklch, var(--accent) 12%, var(--c-surface)); border-color: var(--accent); border-style: solid; color: #b4552b; }
  .pl-stage.push .pl-label { color: #b4552b; font-weight: 600; }
  html.dark .pl-stage.push .pl-node, html.dark .pl-stage.push .pl-label { color: var(--accent); }
  .dcs-row.push .dcs-ico { color: var(--accent); }
  html.dark .dcs-row.push .dcs-ico { color: var(--accent); }
  .dcs-tag.push { background: color-mix(in oklch, var(--accent) 15%, transparent); color: #b4552b; }
  html.dark .dcs-tag.push { color: var(--accent); }

  /* ── One-time-secret reveal callout (ingest key mint · invite code) ── */
  .minted { border: 1px solid color-mix(in oklch, var(--accent) 45%, var(--border)); background: color-mix(in oklch, var(--accent) 7%, var(--c-surface)); border-radius: var(--radius-lg); padding: .9rem 1rem 1rem; margin-bottom: 1.25rem; box-shadow: var(--shadow-xs); }
  .minted-head { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
  .minted-head strong { font-size: .92rem; color: var(--c-ink); }
  .minted .once { margin: .45rem 0 .8rem; font-size: .82rem; line-height: 1.45; color: var(--c-mid); max-width: 40rem; }
  .minted-secret { display: flex; align-items: center; gap: .6rem; }
  .minted-code { flex: 1; min-width: 0; font-family: var(--font-mono); font-size: .84rem; color: var(--c-ink); background: var(--c-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: .5rem .7rem; overflow-x: auto; white-space: nowrap; }
  .minted-row { display: flex; align-items: center; gap: .6rem; margin-top: .5rem; }
  .minted-label { flex: 0 0 6rem; font-size: .68rem; text-transform: uppercase; letter-spacing: .05em; font-weight: 600; color: var(--c-soft); }
  .minted-copy { flex: 0 0 auto; }
  @media (max-width: 560px) { .minted-row { flex-wrap: wrap; } .minted-label { flex-basis: 100%; } }

  /* ── Config › Ingest Keys ── */
  .cfg-keys-head { margin: .25rem 0 .75rem; }
  .cfg-key-revoke { font: inherit; font-size: .78rem; color: var(--c-fail); background: none; border: 1px solid color-mix(in oklch, var(--destructive) 30%, var(--border)); border-radius: var(--radius-sm); padding: .15rem .6rem; cursor: pointer; }
  .cfg-key-revoke:hover { background: color-mix(in oklch, var(--destructive) 8%, transparent); border-color: color-mix(in oklch, var(--destructive) 50%, var(--border)); }
  .cfg-key-revoked td { opacity: .55; }
  .cfg-key-revoked .cfg-feed-name { text-decoration: line-through; }

  /* ── Ingest area ── */
  .ig-health { display: inline-flex; align-items: center; gap: .4rem; font-size: .74rem; font-weight: 600; padding: .12rem .55rem .12rem .45rem; border-radius: 999px; border: 1px solid; white-space: nowrap; flex: 0 0 auto; }
  .ig-hdot { width: .5rem; height: .5rem; border-radius: 50%; flex: 0 0 auto; }
  .ig-h-fresh { color: var(--c-ok); border-color: var(--c-ok-line); background: var(--c-ok-bg); }
  .ig-h-fresh .ig-hdot { background: var(--c-ok-dot); }
  .ig-h-stale { color: var(--c-warn); border-color: color-mix(in oklch, var(--c-warn-dot) 45%, var(--border)); background: var(--c-warn-bg); }
  .ig-h-stale .ig-hdot { background: var(--c-warn-dot); }
  .ig-h-never { color: var(--c-soft); border-color: var(--c-line2); background: color-mix(in oklch, var(--muted) 45%, transparent); }
  .ig-h-never .ig-hdot { background: var(--c-faint); }

  .ig-live-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: .75rem; margin-bottom: .5rem; }
  .ig-live-card { border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--c-surface); box-shadow: var(--shadow-xs); padding: 1rem 1.1rem 1.05rem; display: flex; flex-direction: column; gap: .55rem; }
  .ig-live-card.never { opacity: .82; }
  .ig-live-head { display: flex; align-items: flex-start; justify-content: space-between; gap: .75rem; }
  .ig-live-id { display: flex; flex-direction: column; gap: .1rem; min-width: 0; }
  .ig-live-source { font-weight: 600; font-size: .98rem; color: var(--c-ink); }
  .ig-live-label { font-family: var(--font-mono); font-size: .76rem; color: var(--muted-foreground); }
  .ig-live-when { display: flex; flex-direction: column; gap: .1rem; }
  .ig-live-ago { font-size: 1.5rem; font-weight: 600; letter-spacing: -.02em; line-height: 1.05; color: var(--c-ink); }
  .ig-live-card.never .ig-live-ago { color: var(--c-soft); font-weight: 500; font-size: 1.15rem; }
  .ig-live-counts { display: flex; gap: 1.75rem; padding: .55rem 0 .1rem; border-top: 1px solid var(--c-line); }
  .ig-count { display: flex; flex-direction: column; gap: .05rem; }
  .ig-count-v { font-size: 1.05rem; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--c-ink); }
  .ig-count-k { font-size: .72rem; }
  .ig-live-foot { display: flex; align-items: center; flex-wrap: wrap; gap: .4rem; font-size: .78rem; color: var(--c-mid); padding-top: .1rem; }
  .ig-live-foot .dimsep { opacity: .5; }
  .ig-ver code { font-family: var(--font-mono); font-size: .78rem; color: var(--c-body); }
  .ig-skew { display: inline-flex; align-items: center; gap: .25rem; font-size: .68rem; font-weight: 600; color: var(--c-warn); border: 1px solid color-mix(in oklch, var(--c-warn-dot) 45%, var(--border)); background: var(--c-warn-bg); border-radius: 999px; padding: .05rem .45rem; margin-left: auto; }

  /* Per-source breakdown inside a scraper card */
  .ig-src-list { display: flex; flex-direction: column; gap: .05rem; padding: .5rem 0 .1rem; border-top: 1px solid var(--c-line); }
  .ig-src { display: flex; align-items: center; gap: .5rem; padding: .2rem 0; }
  .ig-src-dot { display: inline-flex; flex: 0 0 auto; }
  .ig-src-dot .ig-hdot { width: .5rem; height: .5rem; border-radius: 50%; }
  .ig-src-name { font-size: .84rem; color: var(--c-ink); }
  .ig-src-meta { margin-left: auto; white-space: nowrap; font-variant-numeric: tabular-nums; }

  /* Discovery sub-tabs + compact ingest strip */
  .dc-subnav { margin-bottom: 1.25rem; }
  .dc-ingest-strip { display: flex; align-items: center; gap: .6rem; width: 100%; text-align: left; font: inherit; cursor: pointer; background: var(--c-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-xs); padding: .6rem .85rem; margin-bottom: 1.25rem; color: var(--c-body); transition: border-color .12s, box-shadow .12s; }
  .dc-ingest-strip:hover { border-color: color-mix(in oklch, var(--accent) 45%, var(--border)); box-shadow: var(--shadow-sm); }
  .dc-ingest-strip.warn { border-color: color-mix(in oklch, var(--c-warn-dot) 40%, var(--border)); background: color-mix(in oklch, var(--c-warn-bg) 55%, var(--c-surface)); }
  .dc-strip-ico { display: inline-flex; color: var(--accent); flex: 0 0 auto; }
  .dc-ingest-strip.warn .dc-strip-ico { color: var(--c-warn); }
  .dc-strip-main { flex: 1; font-size: .85rem; }
  .dc-strip-main strong { color: var(--c-ink); font-weight: 600; }
  .dc-strip-warn { color: var(--c-warn); font-weight: 600; }
  .dc-strip-go { display: inline-flex; align-items: center; gap: .3rem; font-size: .8rem; font-weight: 500; color: var(--accent); flex: 0 0 auto; }

  /* Throughput funnel */
  .ig-gap { margin-top: 2rem; }
  .ig-funnel { border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--c-surface); box-shadow: var(--shadow-xs); padding: 1.15rem 1.25rem 1.25rem; }
  .ig-arrival { display: flex; align-items: stretch; gap: .3rem; }
  .ig-fstep { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; gap: .35rem; }
  .ig-fval { font-size: 1.7rem; font-weight: 600; letter-spacing: -.02em; line-height: 1; font-variant-numeric: tabular-nums; color: var(--c-ink); }
  .ig-fstep.tone-dup .ig-fval { color: var(--c-warn); }
  .ig-fstep.tone-accepted .ig-fval { color: var(--c-ok); }
  .ig-flabel { font-size: .78rem; font-weight: 500; color: var(--c-body); }
  .ig-fbar { height: .35rem; border-radius: 999px; background: var(--muted); overflow: hidden; }
  .ig-fbar > span { display: block; height: 100%; border-radius: 999px; background: var(--accent); }
  .ig-fstep.tone-dup .ig-fbar > span { background: var(--c-warn-dot); }
  .ig-fstep.tone-accepted .ig-fbar > span { background: var(--c-ok-dot); }
  .ig-fnote { line-height: 1.35; }
  .ig-farrow { display: flex; align-items: center; color: var(--c-faint); flex: 0 0 auto; padding-top: .55rem; }
  .ig-down-head { display: flex; align-items: baseline; gap: .6rem; margin: 1.35rem 0 .65rem; padding-top: 1.15rem; border-top: 1px dashed var(--border); }
  .ig-down-cap { font-size: .72rem; text-transform: uppercase; letter-spacing: .045em; color: var(--c-soft); font-weight: 600; }
  .ig-down { display: grid; grid-template-columns: repeat(4, 1fr); gap: .55rem; }
  .ig-out { border: 1px solid var(--border); border-left: 3px solid var(--border); border-radius: var(--radius-md); background: var(--c-surface); padding: .6rem .75rem; display: flex; flex-direction: column; gap: .1rem; }
  .ig-out.kind-accepted { border-left-color: var(--c-ok-dot); }
  .ig-out.kind-dup, .ig-out.kind-reject { border-left-color: var(--c-warn-dot); }
  .ig-out.kind-park { border-left-color: var(--c-fail); }
  .ig-out-val { font-size: 1.25rem; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--c-ink); }
  .ig-out-label { font-size: .76rem; color: var(--c-mid); }

  /* Recent pushes table */
  .ig-th-num { text-align: right; }
  .ig-push-when { white-space: nowrap; }
  .ig-push-ago { display: block; color: var(--c-ink); }
  .ig-push-abs { display: block; }
  .ig-result { font-size: .72rem; font-weight: 600; padding: .1rem .5rem; border-radius: 999px; border: 1px solid; white-space: nowrap; }
  .ig-r-ok { color: var(--c-ok); border-color: var(--c-ok-line); background: var(--c-ok-bg); }
  .ig-r-warn { color: var(--c-warn); border-color: color-mix(in oklch, var(--c-warn-dot) 45%, var(--border)); background: var(--c-warn-bg); }
  .ig-r-fail { color: var(--c-fail); border-color: color-mix(in oklch, var(--destructive) 35%, var(--border)); background: var(--c-fail-bg); }
  .ig-push-note { display: block; margin-top: .15rem; }

  /* Status: ingest scraper glyph states */
  .sglyph.fresh { color: var(--c-ok-dot); }
  .sglyph.stale { color: var(--c-warn-dot); }

  @media (max-width: 640px) {
    .ig-live-grid { grid-template-columns: 1fr; }
    .ig-arrival { flex-direction: column; }
    .ig-farrow { transform: rotate(90deg); align-self: center; padding: 0; }
    .ig-down { grid-template-columns: repeat(2, 1fr); }
  }

  /* ── Ingredient Normalization ──────────────────────────────────────
     Outcome palette: same=green · specialization=blue · novel=zinc ·
     merge=violet · no-llm=neutral · failed=red. */
  .nz-stat-grid { grid-template-columns: repeat(3, 1fr); gap: .6rem; }
  .nz-stat-grid .stat-card { padding: .8rem .85rem .85rem; min-width: 0; }
  .nz-stat-grid .stat-top { gap: .35rem; }
  .nz-stat-grid .stat-label { white-space: normal; font-size: .68rem; line-height: 1.2; }
  .nz-stat-grid .stat-ico svg { width: 14px; height: 14px; }
  .nz-stat-grid .stat-value { font-size: 1.6rem; margin-top: .4rem; }
  .nz-stat-grid .stat-sub { font-size: .68rem; }
  .nz-stat-warn { border-color: color-mix(in oklch, var(--accent) 45%, var(--border)); background: color-mix(in oklch, var(--accent) 6%, var(--c-surface)); }
  .nz-stat-warn .stat-value { color: #b4552b; }
  html.dark .nz-stat-warn .stat-value { color: var(--accent); }
  .nz-stat-bad { border-color: color-mix(in oklch, var(--destructive) 35%, var(--border)); background: color-mix(in oklch, var(--destructive) 5%, var(--c-surface)); }
  .nz-stat-bad .stat-value { color: var(--c-fail); }
  @media (max-width: 640px) { .nz-stat-grid { grid-template-columns: repeat(2, 1fr); } }

  /* Outcome tokens, applied per kind. */
  .oc-same   { --oc: var(--c-ok);     --oc-bg: var(--c-ok-bg);     --oc-line: var(--c-ok-line); }
  .oc-specialization, .oc-spec { --oc: var(--c-info); --oc-bg: var(--c-info-bg); --oc-line: color-mix(in oklch, var(--c-info) 40%, var(--border)); }
  .oc-novel  { --oc: var(--c-mid);    --oc-bg: color-mix(in oklch, var(--muted) 60%, transparent); --oc-line: var(--c-line2); }
  .oc-merge  { --oc: var(--c-purple); --oc-bg: var(--c-purple-bg); --oc-line: color-mix(in oklch, var(--c-purple) 40%, var(--border)); }
  .oc-no_llm, .oc-nollm { --oc: var(--c-soft); --oc-bg: color-mix(in oklch, var(--muted) 45%, transparent); --oc-line: var(--c-line2); }
  .oc-failed, .oc-fail { --oc: var(--c-fail); --oc-bg: var(--c-fail-bg); --oc-line: color-mix(in oklch, var(--destructive) 35%, var(--border)); }

  /* Filter pills: a colour dot per outcome; active fills with the outcome colour. */
  .nz-pill { display: inline-flex; align-items: center; }
  .nz-pill.oc-all::before { display: none; }
  .nz-pill:not(.oc-all)::before { content: ""; width: .5rem; height: .5rem; border-radius: 50%; background: var(--oc); margin-right: .45rem; flex: 0 0 auto; }
  .nz-pill.active:not(.oc-all) { background: var(--oc-bg); border-color: var(--oc-line); color: var(--oc); font-weight: 600; }
  .nz-pill.active:not(.oc-all)::before { background: var(--oc); }
  .nz-pill.oc-novel.active, .nz-pill.oc-no_llm.active { color: var(--c-ink); }

  /* Outcome badge. */
  .nz-badge { display: inline-flex; align-items: center; gap: .25rem; font-size: .68rem; font-weight: 600; letter-spacing: .01em; padding: .1rem .5rem; border-radius: 999px; border: 1px solid var(--oc-line); background: var(--oc-bg); color: var(--oc); white-space: nowrap; flex: 0 0 auto; }

  /* Decision cards. */
  .nz-list { display: flex; flex-direction: column; gap: .55rem; }
  .nz-card { border: 1px solid var(--border); border-left: 3px solid var(--oc); border-radius: var(--radius-lg); background: var(--c-surface); box-shadow: var(--shadow-xs); overflow: hidden; transition: box-shadow .15s; }
  .nz-card:hover { box-shadow: var(--shadow-sm); }
  .nz-card.oc-failed { background: color-mix(in oklch, var(--destructive) 3%, var(--c-surface)); }
  .nz-main { display: block; width: 100%; text-align: left; background: none; border: 0; font: inherit; cursor: pointer; padding: .8rem 1rem .3rem; }
  .nz-lead { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }

  .nz-term-wrap { min-width: 0; }
  .nz-term { font-family: var(--font-mono); font-size: .95rem; font-weight: 600; color: var(--c-ink); word-break: break-word; }
  .nz-resolve { display: flex; align-items: center; gap: .45rem; margin-top: .3rem; }
  .nz-arrow { color: var(--c-faint); flex: 0 0 auto; }
  .nz-id { display: inline-flex; align-items: center; gap: .35rem; flex-wrap: wrap; font-family: var(--font-mono); font-size: .84rem; }
  .nz-id-base { color: var(--c-body); }
  .nz-id-dot { color: var(--c-faint); }
  .nz-id-detail { font-size: .74rem; color: var(--c-info); background: var(--c-info-bg); border: 1px solid color-mix(in oklch, var(--c-info) 30%, var(--border)); border-radius: 999px; padding: .02rem .45rem; }
  .nz-id-tag { font-size: .64rem; text-transform: uppercase; letter-spacing: .04em; font-family: var(--font-sans); color: var(--c-purple); border: 1px solid color-mix(in oklch, var(--c-purple) 35%, var(--border)); border-radius: 999px; padding: .02rem .4rem; }

  .nz-badges { display: flex; align-items: center; gap: .5rem; flex: 0 0 auto; flex-wrap: wrap; justify-content: flex-end; }
  .nz-src { font-size: .68rem; text-transform: uppercase; letter-spacing: .04em; font-weight: 600; color: var(--c-soft); border: 1px solid var(--c-line2); border-radius: 999px; padding: .05rem .45rem; display: inline-flex; align-items: center; gap: .25rem; }
  .nz-src.human { color: var(--accent); border-color: color-mix(in oklch, var(--accent) 40%, var(--border)); background: color-mix(in oklch, var(--accent) 8%, transparent); }
  .nz-time { font-size: .78rem; white-space: nowrap; }

  .nz-foot { display: flex; align-items: center; gap: .75rem; padding: .1rem 1rem .65rem; }
  .nz-expand { background: none; border: 0; font: inherit; font-size: .8rem; color: var(--muted-foreground); cursor: pointer; display: inline-flex; align-items: center; gap: .3rem; }
  .nz-expand:hover { color: var(--c-ink); }
  .nz-expand svg { transition: transform .15s; }
  .nz-expand svg.up { transform: rotate(180deg); }
  .nz-actions { margin-left: auto; display: inline-flex; align-items: center; gap: .5rem; }
  .nz-act-btn { gap: .3rem; }
  .nz-requeued { display: inline-flex; align-items: center; gap: .35rem; color: var(--c-ok); }
  .nz-del { display: inline-flex; align-items: center; justify-content: center; width: 1.9rem; height: 1.9rem; border: 1px solid color-mix(in oklch, var(--destructive) 30%, var(--border)); border-radius: var(--radius-md); background: none; color: var(--c-fail); cursor: pointer; }
  .nz-del:hover { background: color-mix(in oklch, var(--destructive) 8%, transparent); border-color: color-mix(in oklch, var(--destructive) 50%, var(--border)); }

  /* Expanded detail. */
  .nz-detail { border-top: 1px solid var(--c-line); padding: .9rem 1rem 1rem; display: flex; flex-direction: column; gap: 1rem; }
  .nz-detail-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; color: var(--c-soft); font-weight: 600; margin: 0 0 .55rem; }
  .nz-detail-label .muted { text-transform: none; letter-spacing: 0; font-weight: 400; }

  .nz-cands { display: flex; flex-direction: column; gap: .4rem; }
  .nz-cand { display: grid; grid-template-columns: 11rem 1fr 2.4rem 3.6rem; align-items: center; gap: .7rem; }
  .nz-cand-id { font-family: var(--font-mono); font-size: .8rem; color: var(--c-body); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .nz-cand.chosen .nz-cand-id { color: var(--c-ink); font-weight: 600; }
  .nz-cand-track { height: .5rem; background: var(--muted); border-radius: 999px; overflow: hidden; }
  .nz-cand-fill { display: block; height: 100%; border-radius: 999px; background: var(--c-faint); }
  .nz-cand-fill.chosen { background: var(--c-ok-dot); }
  .nz-cand-fill.floor { background: var(--c-warn-dot); opacity: .7; }
  .nz-cand-score { font-size: .8rem; font-variant-numeric: tabular-nums; text-align: right; color: var(--c-mid); }
  .nz-cand.chosen .nz-cand-score { color: var(--c-ink); font-weight: 600; }
  .nz-cand-flag { font-size: .62rem; text-transform: uppercase; letter-spacing: .04em; font-weight: 700; color: var(--c-ok); }
  .nz-cand-flag.ghost { color: transparent; }
  .nz-cands-note, .nz-empty { margin: .35rem 0 0; }

  .nz-detail-meta { display: flex; flex-wrap: wrap; gap: .5rem 2rem; }
  .nz-meta-item { display: flex; align-items: center; gap: .55rem; }
  .nz-meta-k { font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; color: var(--c-soft); font-weight: 600; }
  .nz-meta-model { font-family: var(--font-mono); font-size: .78rem; color: var(--c-body); background: var(--muted); padding: .1rem .45rem; border-radius: 4px; }
  .nz-chip-floor { display: inline-flex; align-items: center; gap: .3rem; font-size: .74rem; font-weight: 600; color: var(--c-warn); border: 1px solid color-mix(in oklch, var(--c-warn-dot) 45%, var(--border)); background: var(--c-warn-bg); border-radius: 999px; padding: .08rem .5rem; }

  .nz-edges { display: flex; flex-wrap: wrap; gap: .4rem; }
  .nz-edge { display: inline-flex; align-items: center; gap: .35rem; font-size: .78rem; border: 1px solid var(--border); background: color-mix(in oklch, var(--muted) 35%, var(--c-surface)); border-radius: 999px; padding: .12rem .55rem; }
  .nz-edge code { font-family: var(--font-mono); font-size: .78rem; color: var(--c-ink); }
  .nz-edge svg { color: var(--c-faint); flex: 0 0 auto; }
  .nz-edge-rel { font-size: .64rem; text-transform: uppercase; letter-spacing: .04em; font-weight: 600; color: var(--c-soft); }
  .nz-edge.member { border-color: color-mix(in oklch, var(--c-purple) 30%, var(--border)); background: color-mix(in oklch, var(--c-purple) 7%, var(--c-surface)); }
  .nz-edge.member .nz-edge-rel { color: var(--c-purple); }

  .nz-reason { display: flex; gap: .6rem; align-items: baseline; padding-top: .75rem; border-top: 1px dashed var(--border); }
  .nz-reason-k { font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; color: var(--c-soft); font-weight: 600; flex: 0 0 auto; }
  .nz-reason-v { font-size: .85rem; color: var(--c-body); line-height: 1.5; font-style: italic; }

  /* Queue tab. */
  .nz-queue-blurb { max-width: 44rem; margin: 0 0 1rem; line-height: 1.5; }
  .nz-queue-term { font-size: .84rem; color: var(--c-ink); }
  .nz-queue-next { display: inline-flex; align-items: center; gap: .3rem; color: var(--c-mid); }
  .nz-queue-next svg { color: var(--c-faint); }
  .nz-queue-table td { font-size: .85rem; }

  /* Aliases tab. */
  .nz-al-toolbar { display: flex; align-items: center; gap: .75rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .nz-al-search { flex: 1 1 14rem; margin: 0; }
  .nz-al-srcpills { margin: 0; }
  .nz-al-add { margin-left: auto; white-space: nowrap; gap: .3rem; }
  .nz-al-table td { font-size: .85rem; vertical-align: middle; }
  .nz-al-th-arrow { width: 1.4rem; }
  .nz-al-arrow { color: var(--c-faint); width: 1.4rem; }
  .nz-al-variant { font-size: .84rem; color: var(--c-ink); }
  .nz-al-id { display: inline-flex; align-items: center; gap: .5rem; }
  .nz-al-merged { font-size: .62rem; text-transform: uppercase; letter-spacing: .04em; font-weight: 600; color: var(--c-purple); border: 1px solid color-mix(in oklch, var(--c-purple) 35%, var(--border)); border-radius: 999px; padding: .02rem .4rem; }
  .nz-al-empty { text-align: center; padding: 1.5rem 0; }
  .nz-al-flash { animation: nz-al-flash-anim 2s ease-out; }
  @keyframes nz-al-flash-anim { 0%, 25% { background: color-mix(in oklch, var(--accent) 14%, transparent); } 100% { background: transparent; } }

  /* Override panel. */
  .nz-ov { display: flex; flex-direction: column; gap: 1rem; }
  .nz-ov-current { border: 1px solid var(--border); border-radius: var(--radius-md); background: color-mix(in oklch, var(--muted) 30%, transparent); padding: .7rem .85rem; display: flex; flex-direction: column; gap: .45rem; }
  .nz-ov-row { display: flex; align-items: center; gap: .75rem; }
  .nz-ov-k { font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; color: var(--c-soft); font-weight: 600; min-width: 5rem; flex: 0 0 auto; }
  .nz-ov-term { font-family: var(--font-mono); font-size: .88rem; font-weight: 600; color: var(--c-ink); }
  .nz-ov-cur { display: inline-flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
  .nz-ov-cur code { font-family: var(--font-mono); font-size: .82rem; color: var(--c-body); }
  .nz-ov-field { display: flex; flex-direction: column; gap: .4rem; }
  .nz-ov-label { font-size: .82rem; font-weight: 500; color: var(--c-ink); }
  .nz-ov-seg { align-self: flex-start; }
  .nz-ov-merge { display: grid; grid-template-columns: 1fr auto 1fr; align-items: end; gap: .6rem; }
  .nz-ov-into { display: flex; align-items: center; color: var(--c-faint); padding-bottom: .55rem; }
  .nz-ov-pin { display: flex; align-items: center; gap: .4rem; font-size: .78rem; color: var(--accent); background: color-mix(in oklch, var(--accent) 8%, transparent); border: 1px solid color-mix(in oklch, var(--accent) 30%, var(--border)); border-radius: var(--radius-md); padding: .5rem .7rem; }
  .nz-ov-pin svg { flex: 0 0 auto; }

  /* ── grocery/pantry key-reconcile (Normalize card + Status sibling) ──
     Warm-accent for grocery, deeper terracotta for pantry. Converged is a
     positive terminal state (green), never a dead gray "0". */
  :root { --rk-g: var(--accent); --rk-p: #b4552b; }
  html.dark { --rk-p: #d98a5c; }

  /* Review-only preview toggle (drop on translate). */
  .rk-preview { display: flex; align-items: center; gap: .6rem; margin-bottom: .6rem; }
  .rk-preview-cap { font-size: .68rem; text-transform: uppercase; letter-spacing: .05em; color: var(--c-soft); font-weight: 600; }
  .rk-preview-seg { flex: 0 0 auto; }

  /* The convergence card. */
  .rk-card { border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: var(--radius-lg); background: var(--c-surface); box-shadow: var(--shadow-xs); padding: 1.05rem 1.2rem 1.15rem; margin-bottom: 1.75rem; }
  .rk-card.converged { border-left-color: var(--c-ok-dot); }

  .rk-head { display: flex; align-items: flex-start; gap: .7rem; }
  .rk-glyph { display: inline-flex; flex: 0 0 auto; margin-top: .05rem; }
  .rk-glyph.converging { color: var(--accent); }
  .rk-glyph.converged { color: var(--c-ok-dot); }
  .rk-headline { flex: 1; min-width: 0; }
  .rk-title-row { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; }
  .rk-title { font-family: var(--font-mono); font-size: .95rem; font-weight: 600; color: var(--c-ink); }
  .rk-badge { font-size: .68rem; font-weight: 600; letter-spacing: .01em; padding: .1rem .5rem; border-radius: 999px; border: 1px solid; white-space: nowrap; }
  .rk-badge.converging { color: #b4552b; background: color-mix(in oklch, var(--accent) 12%, transparent); border-color: color-mix(in oklch, var(--accent) 40%, var(--border)); }
  html.dark .rk-badge.converging { color: var(--accent); }
  .rk-badge.converged { color: var(--c-ok); background: var(--c-ok-bg); border-color: var(--c-ok-line); }
  .rk-sub { margin: .3rem 0 0; font-size: .82rem; line-height: 1.5; color: var(--c-mid); max-width: 42rem; }

  /* Live (converging) body. */
  .rk-live { margin-top: 1rem; }
  .rk-counts { display: flex; gap: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--c-line); }
  .rk-count { display: flex; flex-direction: column; gap: .25rem; }
  .rk-count-v { font-size: 1.7rem; font-weight: 600; letter-spacing: -.02em; line-height: 1; font-variant-numeric: tabular-nums; color: var(--c-ink); }
  .rk-count-tot .rk-count-v { color: var(--accent); }
  html.dark .rk-count-tot .rk-count-v { color: var(--accent); }
  .rk-count-k { display: inline-flex; align-items: center; gap: .35rem; font-size: .74rem; color: var(--muted-foreground); }
  .rk-dot { width: .5rem; height: .5rem; border-radius: 2px; flex: 0 0 auto; }
  .rk-dot-g { background: var(--rk-g); }
  .rk-dot-p { background: var(--rk-p); }

  .rk-spark-wrap { margin-top: 1rem; }
  .rk-spark-cap { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: .4rem; font-size: .72rem; text-transform: uppercase; letter-spacing: .045em; color: var(--c-soft); font-weight: 600; }
  .rk-spark-axis { text-transform: none; letter-spacing: 0; font-weight: 400; color: var(--c-faint); }
  .rk-spark { display: flex; align-items: flex-end; gap: 3px; height: 42px; }
  .rk-col { flex: 1 1 0; min-width: 0; height: 100%; display: flex; align-items: flex-end; }
  .rk-col-stack { display: flex; flex-direction: column; width: 100%; border-radius: 2px; overflow: hidden; min-height: 3px; }
  .rk-seg { width: 100%; display: block; }
  .rk-seg-g { background: var(--rk-g); }
  .rk-seg-p { background: var(--rk-p); }
  .rk-col-zero { width: 100%; height: 2px; background: var(--c-line2); border-radius: 2px; }

  .rk-foot { display: flex; align-items: center; flex-wrap: wrap; gap: .35rem; margin: 1rem 0 0; font-size: .78rem; color: var(--muted-foreground); line-height: 1.5; }
  .rk-foot svg { color: var(--c-faint); flex: 0 0 auto; }
  .rk-sep { opacity: .5; margin: 0 .15rem; }

  .rk-backlog { display: flex; align-items: flex-start; gap: .5rem; margin-top: 1rem; padding: .6rem .8rem; border-radius: var(--radius-md); font-size: .82rem; line-height: 1.5; color: var(--c-warn); background: var(--c-warn-bg); border: 1px solid color-mix(in oklch, var(--c-warn-dot) 40%, var(--border)); }
  .rk-backlog svg { flex: 0 0 auto; margin-top: .1rem; }
  .rk-backlog strong { font-weight: 600; }

  /* Converged (idle) body. */
  .rk-done { margin-top: 1rem; }
  .rk-facts { display: flex; gap: 2.2rem; margin: 0 0 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--c-line); }
  .rk-fact { display: flex; flex-direction: column; gap: .3rem; }
  .rk-fact dt { font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; color: var(--c-soft); font-weight: 600; }
  .rk-fact dd { margin: 0; font-size: 1.15rem; font-weight: 600; color: var(--c-ink); font-variant-numeric: tabular-nums; }
  .rk-fact dd.rk-noop { font-size: .92rem; font-weight: 500; color: var(--c-mid); }

  /* Status sibling row extras. */
  .sglyph.rk-run { color: var(--accent); }
  .rk-status-spark { margin-top: .7rem; }
  .rk-spark.compact { height: 24px; }
  .rk-job-name { background: none; border: 0; padding: 0; font: inherit; font-family: var(--font-mono); font-size: .9rem; font-weight: 500; color: var(--c-ink); cursor: pointer; display: inline-flex; align-items: center; gap: .3rem; }
  .rk-job-name:hover { color: var(--accent); }
  .rk-job-name svg { color: var(--c-faint); }
  .rk-job-name:hover svg { color: var(--accent); }

  /* Reconcile sub-nav pill + state dot. */
  .rk-tab-dot { display: inline-block; vertical-align: middle; width: .5rem; height: .5rem; border-radius: 50%; margin-right: .4rem; margin-top: -1px; box-shadow: 0 0 0 2px var(--c-surface); }
  .pill:has(.rk-tab-dot) { white-space: nowrap; }
  .rk-tab-dot.converging { background: var(--accent); }
  .rk-tab-dot.converged { background: var(--c-ok-dot); }
  .pill.active .rk-tab-dot { box-shadow: 0 0 0 2px color-mix(in oklch, var(--accent) 55%, var(--c-surface)); }
  .pill.active .rk-tab-dot.converging { background: var(--on-accent); }
  .nz-reconcile .rk-card { margin-bottom: 0; }

  @media (max-width: 640px) {
    .rk-counts { gap: 1.25rem; }
    .rk-facts { flex-wrap: wrap; gap: 1rem 1.5rem; }
  }

  /* ── Self-healing audit surface (Normalize › Audits + Status gauges) ──
     Shares the reconcile convergence vocabulary. Burndown-to-zero is the good
     state: an empty backlog is drawn green ("clean"/"settled"), never a dead
     gray "0". Tones: alias=accent(g) · edge=terracotta(p) · backfill=blue(b). */

  /* Edge-decision outcome tokens (Decisions › Edges). */
  .oc-edge_keep { --oc: var(--c-ok); --oc-bg: var(--c-ok-bg); --oc-line: var(--c-ok-line); }
  .oc-edge_drop { --oc: var(--c-mid); --oc-bg: color-mix(in oklch, var(--muted) 55%, transparent); --oc-line: var(--c-line2); }

  /* Decisions stream segment (Terms / Edges). */
  .nz-stream-bar { display: flex; align-items: center; gap: .8rem; margin: .25rem 0 1rem; flex-wrap: wrap; }
  .nz-stream-seg { flex: 0 0 auto; }
  .nz-stream-n { margin-left: .4rem; font-variant-numeric: tabular-nums; opacity: .55; font-size: .82em; }
  .seg-btn.active .nz-stream-n { opacity: .8; }
  .nz-stream-hint { flex: 1 1 auto; }

  /* Edge-decision cards. */
  .ec-card .ec-main { padding: .8rem 1rem .85rem; display: flex; flex-direction: column; gap: .5rem; }
  .ec-lead { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .ec-edge { display: inline-flex; align-items: center; gap: .4rem; flex-wrap: wrap; min-width: 0; }
  .ec-edge code { font-family: var(--font-mono); font-size: .86rem; color: var(--c-ink); }
  .ec-arrow { color: var(--c-faint); flex: 0 0 auto; }
  .ec-rel { font-size: .62rem; text-transform: uppercase; letter-spacing: .04em; font-weight: 600; color: var(--c-soft); border: 1px solid var(--c-line2); border-radius: 999px; padding: .04rem .4rem; }
  .nz-edge-idlink { background: none; border: 0; padding: 0; font: inherit; cursor: pointer; }
  .nz-edge-idlink code { border-bottom: 1px dotted color-mix(in oklch, var(--accent) 55%, var(--border)); }
  .nz-edge-idlink:hover code { color: var(--accent); }
  .ec-flag { font-size: .62rem; text-transform: uppercase; letter-spacing: .04em; font-weight: 700; color: var(--c-warn); background: var(--c-warn-bg); border: 1px solid color-mix(in oklch, var(--c-warn-dot) 45%, var(--border)); border-radius: 999px; padding: .05rem .45rem; }
  .ec-verdict { display: flex; align-items: center; gap: .4rem; font-size: .84rem; font-weight: 500; color: var(--c-body); }
  .ec-verdict-glyph { display: inline-flex; color: var(--oc); flex: 0 0 auto; }
  .ec-reason { font-size: .82rem; font-style: italic; color: var(--c-mid); line-height: 1.5; }
  .ec-restored { display: inline-flex; align-items: center; gap: .35rem; align-self: flex-start; font-size: .74rem; color: var(--c-info); background: var(--c-info-bg); border: 1px solid color-mix(in oklch, var(--c-info) 30%, var(--border)); border-radius: 999px; padding: .12rem .55rem; }
  .ec-restored svg { flex: 0 0 auto; }
  .ec-restored code { font-size: .72rem; }

  /* Audits tab. */
  .au-tab .rk-preview { margin-bottom: .8rem; }
  .au-section-note { max-width: 44rem; margin: 0 0 .8rem; line-height: 1.5; }

  /* Burndown hero. */
  .au-hero { border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: var(--radius-lg); background: var(--c-surface); box-shadow: var(--shadow-xs); padding: 1.05rem 1.2rem 1.15rem; margin-bottom: 1.5rem; }
  .au-hero.converged { border-left-color: var(--c-ok-dot); }
  .au-hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--c-line); }
  .au-burn-head { display: flex; flex-direction: column; gap: .55rem; }
  .au-burn-count { display: flex; flex-direction: column; gap: .25rem; }
  .au-burn-v { font-size: 1.7rem; font-weight: 600; letter-spacing: -.02em; line-height: 1; font-variant-numeric: tabular-nums; color: var(--c-ink); }
  .au-burn-v.zero { color: var(--c-ok); }
  .au-burn-k { display: inline-flex; align-items: center; gap: .35rem; font-size: .74rem; color: var(--muted-foreground); }
  .au-dot { width: .5rem; height: .5rem; border-radius: 2px; flex: 0 0 auto; }
  .au-dot-alias { background: var(--accent); }
  .au-dot-edge { background: var(--rk-p, #b4552b); }

  /* Burndown sparkline (remaining backlog per tick → floor). */
  .au-burn { display: flex; align-items: flex-end; gap: 3px; height: 44px; }
  .au-burn.compact { height: 26px; }
  .au-burn-col { flex: 1 1 0; min-width: 0; height: 100%; display: flex; align-items: flex-end; }
  .au-burn-bar { width: 100%; display: block; border-radius: 2px; min-height: 3px; }
  .au-burn-bar.g { background: var(--accent); }
  .au-burn-bar.p { background: var(--rk-p, #b4552b); }
  .au-burn-bar.b { background: var(--c-info); }
  .au-burn-floor { width: 100%; height: 2px; background: var(--c-ok-dot); border-radius: 2px; }

  /* Audit pass cards. */
  .au-pass-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; margin-bottom: .5rem; }
  .au-pass { border: 1px solid var(--border); border-top: 2px solid var(--accent); border-radius: var(--radius-lg); background: var(--c-surface); box-shadow: var(--shadow-xs); padding: .9rem 1rem 1rem; display: flex; flex-direction: column; gap: .6rem; }
  .au-pass.converged { border-top-color: var(--c-ok-dot); }
  .au-pass-head { display: flex; align-items: center; gap: .5rem; }
  .au-pass-ico { display: inline-flex; color: var(--accent); flex: 0 0 auto; }
  .au-pass-ico.converged { color: var(--c-ok-dot); }
  .au-pass-name { font-family: var(--font-mono); font-size: .86rem; font-weight: 600; color: var(--c-ink); flex: 1; min-width: 0; }
  .au-pass-badge { font-size: .64rem; font-weight: 600; letter-spacing: .01em; padding: .08rem .45rem; border-radius: 999px; border: 1px solid; white-space: nowrap; }
  .au-pass-badge.converging { color: #b4552b; background: color-mix(in oklch, var(--accent) 12%, transparent); border-color: color-mix(in oklch, var(--accent) 40%, var(--border)); }
  html.dark .au-pass-badge.converging { color: var(--accent); }
  .au-pass-badge.converged { color: var(--c-ok); background: var(--c-ok-bg); border-color: var(--c-ok-line); }
  .au-pass-blurb { margin: 0; font-size: .76rem; line-height: 1.5; color: var(--c-mid); }
  .au-pass-spark-cap { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: .35rem; font-size: .68rem; color: var(--muted-foreground); }
  .au-pass-axis { color: var(--c-faint); white-space: nowrap; }
  .au-spark { display: flex; align-items: flex-end; gap: 2px; height: 34px; }
  .au-spark.compact { height: 22px; }
  .au-spark-col { flex: 1 1 0; min-width: 0; height: 100%; display: flex; align-items: flex-end; }
  .au-spark-zero { width: 100%; height: 2px; background: var(--c-line2); border-radius: 2px; }
  .au-spark-stack { width: 100%; display: flex; flex-direction: column; border-radius: 2px; overflow: hidden; min-height: 3px; }
  .au-spark-seg { width: 100%; display: block; }
  .au-spark-seg.changed { background: var(--accent); }
  .au-spark-seg.kept { background: color-mix(in oklch, var(--accent) 30%, var(--muted)); }
  .au-pass-stats { margin-top: .1rem; }
  .au-pass-stats .jstat { font-size: .72rem; padding: .1rem .45rem; }
  .au-pass-foot { margin: 0; display: flex; align-items: center; flex-wrap: wrap; gap: .2rem; font-size: .72rem; color: var(--muted-foreground); }
  .au-pass-foot svg { color: var(--c-faint); flex: 0 0 auto; margin-right: .15rem; }

  /* Restorations / replay log. */
  .au-restore { display: flex; flex-direction: column; gap: .5rem; margin-bottom: .5rem; }
  .au-rst { display: flex; gap: .7rem; border: 1px solid var(--border); border-left: 3px solid var(--c-line2); border-radius: var(--radius-lg); background: var(--c-surface); box-shadow: var(--shadow-xs); padding: .7rem .9rem .75rem; }
  .au-rst.tone-ok { border-left-color: var(--c-ok-dot); }
  .au-rst.tone-info { border-left-color: var(--c-info); }
  .au-rst.tone-muted { border-left-color: var(--c-faint); }
  .au-rst-ico { display: inline-flex; flex: 0 0 auto; margin-top: .1rem; color: var(--c-soft); }
  .au-rst.tone-ok .au-rst-ico { color: var(--c-ok); }
  .au-rst.tone-info .au-rst-ico { color: var(--c-info); }
  .au-rst-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: .3rem; }
  .au-rst-top { display: flex; align-items: center; gap: .55rem; flex-wrap: wrap; }
  .au-rst-kind { font-size: .64rem; text-transform: uppercase; letter-spacing: .04em; font-weight: 700; padding: .06rem .45rem; border-radius: 999px; border: 1px solid; white-space: nowrap; }
  .au-rst-kind.tone-ok { color: var(--c-ok); background: var(--c-ok-bg); border-color: var(--c-ok-line); }
  .au-rst-kind.tone-info { color: var(--c-info); background: var(--c-info-bg); border-color: color-mix(in oklch, var(--c-info) 30%, var(--border)); }
  .au-rst-kind.tone-muted { color: var(--c-soft); background: color-mix(in oklch, var(--muted) 50%, transparent); border-color: var(--c-line2); }
  .au-rst-edge { display: inline-flex; align-items: center; gap: .35rem; flex-wrap: wrap; min-width: 0; }
  .au-rst-edge code { font-family: var(--font-mono); font-size: .8rem; color: var(--c-ink); }
  .au-rst-edge svg { color: var(--c-faint); flex: 0 0 auto; }
  .au-rst-rel { font-size: .6rem; text-transform: uppercase; letter-spacing: .04em; font-weight: 600; color: var(--c-soft); }
  .au-rst-time { margin-left: auto; font-size: .76rem; white-space: nowrap; }
  .au-rst-verdict { font-size: .82rem; color: var(--c-body); line-height: 1.45; }
  .au-rst-origin { font-size: .74rem; color: var(--muted-foreground); display: inline-flex; align-items: center; gap: .35rem; flex-wrap: wrap; }
  .au-rst-link { background: none; border: 0; padding: 0; font: inherit; font-size: .74rem; cursor: pointer; display: inline-flex; align-items: center; gap: .3rem; color: var(--muted-foreground); }
  .au-rst-was { font-family: var(--font-mono); color: var(--c-fail); }
  .au-rst-link code { color: var(--c-mid); border-bottom: 1px dotted var(--c-faint); }
  .au-rst-link:hover code { color: var(--accent); border-bottom-color: var(--accent); }

  /* Merge-rejection memory table. */
  .au-rej-wrap { margin-bottom: .5rem; }
  .au-rej-table td { font-size: .84rem; vertical-align: middle; }
  .au-rej-pair { display: inline-flex; align-items: center; gap: .4rem; }
  .au-rej-pair code { font-family: var(--font-mono); font-size: .8rem; color: var(--c-ink); }
  .au-rej-x { display: inline-flex; color: var(--c-fail); }
  .au-rej-reason { max-width: 22rem; }
  .au-rej-until { display: inline-flex; align-items: center; gap: .3rem; color: var(--c-mid); }
  .au-rej-until svg { color: var(--c-faint); }

  /* Status: recipe-backfill gauge + audit status row. */
  .bf-gauge { margin-top: .7rem; }
  .bf-foot { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; margin-top: .4rem; }
  .bf-note { font-size: .74rem; color: var(--muted-foreground); line-height: 1.4; }
  .bf-degraded { display: inline-flex; align-items: center; gap: .3rem; font-size: .7rem; font-weight: 600; color: var(--c-warn); background: var(--c-warn-bg); border: 1px solid color-mix(in oklch, var(--c-warn-dot) 45%, var(--border)); border-radius: 999px; padding: .1rem .5rem; white-space: nowrap; }
  .bf-degraded svg { flex: 0 0 auto; }
  .sglyph.rk-run { color: var(--accent); }
  .au-status-burns { display: flex; gap: 1.5rem; margin-top: .1rem; }
  .au-status-burn { flex: 1 1 0; min-width: 0; }
  .au-status-lab { display: block; margin-top: .2rem; font-size: .66rem; text-transform: uppercase; letter-spacing: .04em; color: var(--c-soft); }

  @media (max-width: 640px) {
    .au-hero-grid { grid-template-columns: 1fr; gap: 1.1rem; }
    .au-pass-grid { grid-template-columns: 1fr; }
  }

  /* ── Normalization › Nodes (identity graph lens) ──────────────────
     A browsable node list + a read-only relationship detail. Directed
     "satisfies" edges are laid on one left-to-right axis so the graph's
     asymmetry reads consistently. Kind palette: general=blue ·
     containment=amber · membership=violet. */
  .ng-inline-filter { background: none; border: 0; padding: 0; font: inherit; color: var(--accent); cursor: pointer; font-weight: 600; }
  .ng-inline-filter:hover { text-decoration: underline; }
  .ng-sort { flex: 0 0 auto; }

  .ng-facets .ng-facet-ico { margin-right: .3rem; }
  .pill.ng-pill-orphan { display: inline-flex; align-items: center; }
  .pill.ng-pill-orphan.active { background: var(--c-warn-bg); border-color: color-mix(in oklch, var(--c-warn-dot) 45%, var(--border)); color: var(--c-warn); font-weight: 600; }

  /* Node list rows. */
  .ng-list { display: flex; flex-direction: column; gap: .4rem; }
  .ng-row { display: flex; align-items: center; gap: .8rem; width: 100%; text-align: left; background: var(--c-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-xs); padding: .6rem .85rem; font: inherit; cursor: pointer; transition: border-color .12s, background .12s; }
  .ng-row:hover { border-color: color-mix(in oklch, var(--accent) 45%, var(--border)); background: color-mix(in oklch, var(--muted) 30%, var(--c-surface)); }
  .ng-row:focus-visible { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 30%, transparent); }
  .ng-row.orphan { border-left: 3px solid var(--c-warn-dot); }

  .ng-row-glyph { display: inline-flex; align-items: center; justify-content: center; width: 2rem; height: 2rem; border-radius: 50%; flex: 0 0 auto; background: color-mix(in oklch, var(--muted) 55%, transparent); color: var(--c-mid); }
  .ng-row-glyph.concept { background: var(--c-purple-bg); color: var(--c-purple); }
  .ng-row-glyph.orphan { background: var(--c-warn-bg); color: var(--c-warn); }
  .ng-row-glyph.big { width: 2.6rem; height: 2.6rem; }

<script type="text/babel">

function App() {
  const areas = ["Status", "Members", "Data", "Insights", "Usage", "Discovery", "Normalize", "Logs", "Config"];
  const [area, setArea] = React.useState("Status");
  const [recipeTarget, setRecipeTarget] = React.useState(null);
  const [logTarget, setLogTarget] = React.useState(null);
  const [dataTarget, setDataTarget] = React.useState(null);
  const [configTarget, setConfigTarget] = React.useState(null);
  React.useEffect(() => {
    window.GA.openRecipe = (slug) => {setRecipeTarget({ slug, n: Date.now() });setArea("Data");};
    window.GA.openLog = (id) => {setLogTarget({ id, n: Date.now() });setArea("Logs");};
    window.GA.openStores = () => {setDataTarget({ tab: "Stores", n: Date.now() });setArea("Data");};
    window.GA.openConfigFeeds = () => {setConfigTarget({ section: "feeds", n: Date.now() });setArea("Config");};
  }, []);
  const goArea = (a) => {setRecipeTarget(null);setLogTarget(null);setDataTarget(null);setConfigTarget(null);setArea(a);};
  const screens = {
    Status: window.GA.StatusScreen,
    Members: window.GA.MembersScreen,
    Data: window.GA.DataScreen,
    Insights: window.GA.InsightsScreen,
    Usage: window.GA.UsageScreen,
    Discovery: window.GA.DiscoveryScreen,
    Normalize: window.GA.NormalizeScreen,
    Logs: window.GA.LogsScreen,
    Config: window.GA.ConfigScreen
  };
  const Screen = screens[area];
  const HealthIndicator = window.GA.HealthIndicator;
  const I = window.GA.icons;
  const [dark, setDark] = React.useState(() => document.documentElement.classList.contains("dark"));
  const toggleTheme = () => {
    const next = !dark;
    setDark(next);
    document.documentElement.classList.toggle("dark", next);
    try { localStorage.setItem("ga-theme", next ? "dark" : "light"); } catch (e) {}
  };
  return (
    <>
        <button className="theme-toggle" onClick={toggleTheme} aria-label={dark ? "Switch to light mode" : "Switch to dark mode"} title={dark ? "Light mode" : "Dark mode"}>
          {dark ? <I.sun size={17} /> : <I.moon size={17} />}
        </button>
        <div className="topbar">
          <h1>grocery-agent admin</h1>
        </div>
        <nav className="nav">
          {areas.map((a) =>
        <button key={a} className={"nav-link" + (a === area ? " active" : "")} onClick={() => goArea(a)}>{a}</button>
        )}
        </nav>
        <div className="stage"><Screen onNavigate={goArea} recipeTarget={recipeTarget} logTarget={logTarget} dataTarget={dataTarget} configTarget={configTarget} /></div>
        <HealthIndicator onOpenStatus={() => goArea("Status")} />
      </>);

}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
