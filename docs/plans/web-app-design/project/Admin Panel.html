<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>grocery-agent admin · Status</title>
<link rel="stylesheet" href="_ds/basecoat-ui-959bddfb-ed12-46c1-83f4-cb93ecc6849b/tokens/colors.css" />
<link rel="stylesheet" href="_ds/basecoat-ui-959bddfb-ed12-46c1-83f4-cb93ecc6849b/tokens/typography.css" />
<link rel="stylesheet" href="_ds/basecoat-ui-959bddfb-ed12-46c1-83f4-cb93ecc6849b/tokens/radius.css" />
<link rel="stylesheet" href="_ds/basecoat-ui-959bddfb-ed12-46c1-83f4-cb93ecc6849b/base.css" />
<link rel="stylesheet" href="_ds/basecoat-ui-959bddfb-ed12-46c1-83f4-cb93ecc6849b/basecoat.css" />
<link rel="stylesheet" href="_ds/basecoat-ui-959bddfb-ed12-46c1-83f4-cb93ecc6849b/styles.css" />
<style>
  /* ── Operator theme: warm orange accent over Basecoat's neutral primary. ── */
  :root {
    /* Custom-palette aliases — light values mirror the original design exactly;
       html.dark (below) remaps them for dark mode. DS tokens flip on their own. */
    --on-accent: #1a1a1a;
    --c-surface: #fff; --c-page: #fafafa;
    --c-ink: #1a1a1a; --c-body: #333; --c-mid: #555; --c-soft: #888; --c-faint: #bbb;
    --c-line: #f2f2f2; --c-line2: #e5e5e5;
    --c-ok: #1a7f37; --c-ok-dot: #2da44e; --c-ok-bg: #eaf6ee; --c-ok-line: #bfe3cb;
    --c-warn: #9a6700; --c-warn-dot: #d4a72c; --c-warn-bg: #fdf6e3;
    --c-fail: #cf222e; --c-fail-bg: #fdecee;
    --c-info: #2a6fb0; --c-info-bg: #eaf3fb; --c-purple: #7a4fb0; --c-purple-bg: #f4eefb;
    --primary: #f4a259;
    --primary-foreground: var(--on-accent);
    --accent: #f4a259;
    /* KV namespace categorical palette — a warm trio on the operator theme. */
    --kv-kroger: #e8843f;
    --kv-oauth: #b4552b;
    --kv-tenant: #edc983;
  }
  body { margin: 0; background: var(--c-page); font-family: var(--font-sans); color: var(--c-ink); }
  .wrap { max-width: 46rem; margin: 2.5rem auto; padding: 0 1.5rem 6rem; }
  h1 { font-size: 1.5rem; font-weight: 600; margin: 0; }
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
  h2 { font-size: 1.1rem; font-weight: 500; margin: 0; }
  code { font-family: var(--font-mono); font-size: .85em; }

  /* Top-level area nav. */
  .nav { display: flex; gap: .25rem; margin: .75rem 0 1.5rem; border-bottom: 1px solid var(--c-line2); }
  .nav-link { background: none; border: 0; font: inherit; cursor: pointer; color: var(--c-mid); padding: .5rem .75rem; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .nav-link:hover { color: var(--c-ink); }
  .nav-link.active { color: var(--c-ink); border-bottom-color: var(--accent); font-weight: 600; }

  /* Sub-nav pills (Data + Config). */
  .data-nav { display: flex; gap: .5rem; flex-wrap: wrap; margin: .25rem 0 1.25rem; }
  .pill { font: inherit; font-size: .85rem; padding: .3rem .85rem; border-radius: 999px; border: 1px solid var(--c-line2); background: var(--c-surface); color: var(--c-mid); cursor: pointer; }
  .pill:hover { border-color: var(--c-faint); }
  .pill.active { background: var(--accent); color: var(--on-accent); border-color: var(--accent); font-weight: 600; }

  /* Area heading row with a Refresh action. */
  .area-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
  .area-head.status-head { justify-content: flex-end; margin-bottom: 1rem; }
  .data-title { margin-bottom: .35rem; }
  .link-action { background: none; border: 0; font: inherit; font-size: .85rem; color: var(--c-mid); cursor: pointer; padding: 0; display: inline-flex; align-items: center; gap: .35rem; }
  .link-action:hover { color: var(--c-ink); }
  .link-action svg { color: var(--c-soft); }
  .muted { color: var(--c-soft); }
  .small { font-size: .8rem; }
  .form-actions { display: flex; gap: .75rem; align-items: center; margin-top: .5rem; }

  /* Status dots (shared). */
  .dot { width: .6rem; height: .6rem; border-radius: 50%; background: var(--c-soft); flex: 0 0 auto; }
  .dot.ok { background: var(--c-ok-dot); } .status-word.ok { color: var(--c-ok); }
  .dot.fail { background: var(--c-fail); } .status-word.fail { color: var(--c-fail); }
  .dot.never { background: var(--c-warn-dot); } .status-word.never { color: var(--c-warn); }
  .status-word { font-size: .85rem; font-weight: 600; }
  .headline { display: flex; align-items: center; gap: .5rem; font-size: 1.05rem; font-weight: 600; }
  .status-row { border-bottom: 1px solid var(--c-line); }
  .status-row:last-child { border-bottom: 0; }
  .status-line { display: flex; align-items: center; gap: .6rem; padding: .55rem 0; }
  .status-label { flex: 1; font-family: var(--font-mono); font-size: .9rem; color: var(--c-ink); }

  /* ── Page-level corpus stat tiles ── */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: .75rem; margin-bottom: 1.75rem; }
  .stat-card { background: var(--c-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: .9rem 1rem 1rem; box-shadow: var(--shadow-xs); }
  .stat-top { display: flex; align-items: center; gap: .4rem; color: var(--muted-foreground); }
  .stat-ico { display: inline-flex; }
  .stat-ico svg { width: 15px; height: 15px; }
  .stat-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; font-weight: 500; white-space: nowrap; }
  .stat-value { font-size: 1.7rem; font-weight: 600; letter-spacing: -.02em; margin-top: .45rem; line-height: 1; }
  .stat-sub { font-size: .74rem; color: var(--muted-foreground); margin-top: .3rem; }

  /* ── Usage dashboards ── */
  .usage-card { padding: 0; }
  .usage-card > section { padding: 1.25rem 1.35rem; }
  .usage-sub { font-size: .82rem; font-weight: 600; color: var(--c-ink); margin-bottom: .8rem; }
  .usage-sep { height: 1px; background: var(--c-line); margin: 1.35rem 0 1.25rem; }
  .meter-list { display: flex; flex-direction: column; gap: .85rem; }
  .meter-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: .4rem; }
  .meter-label { font-size: .82rem; color: var(--c-body); font-family: var(--font-mono); }
  .meter-val { font-size: .82rem; font-variant-numeric: tabular-nums; font-weight: 500; }
  .meter-lim { color: var(--muted-foreground); font-weight: 400; }
  .meter.warn .meter-val { color: var(--c-warn); }
  .meter.fail .meter-val { color: var(--c-fail); }
  .meter.warn .progress > span { background: var(--c-warn-dot); }
  .meter.fail .progress > span { background: var(--destructive); }
  .meter-trend { display: flex; align-items: flex-end; gap: .75rem; margin-top: .5rem; }
  .meter-spark { height: 16px; flex: 1; }
  .meter-spark .spark-bar { opacity: .45; }
  .meter.warn .meter-spark .spark-bar { background: var(--c-warn-dot); opacity: .6; }
  .meter.fail .meter-spark .spark-bar { background: var(--destructive); opacity: .6; }
  .meter-peak { font-size: .7rem; color: var(--muted-foreground); white-space: nowrap; font-variant-numeric: tabular-nums; }

  /* Per-job run sparkline */
  .trend-list { display: flex; flex-direction: column; gap: 0; }
  .trend-row { display: grid; grid-template-columns: 9.5rem 1fr 5.5rem 6rem; align-items: center; gap: 1rem; padding: .7rem 0; border-bottom: 1px solid var(--c-line); }
  .trend-row:last-child { border-bottom: 0; }
  .trend-name { font-family: var(--font-mono); font-size: .82rem; color: var(--c-ink); }
  .trend-stat { font-size: .8rem; text-align: right; font-variant-numeric: tabular-nums; }
  .spark { display: flex; align-items: flex-end; gap: 2px; height: 30px; }
  .spark-bar { flex: 1 1 0; min-width: 0; background: var(--accent); border-radius: 1px; opacity: .85; }

  /* Tool usage table */
  .tool-name { font-family: var(--font-mono); font-size: .82rem; }
  .tool-err { color: var(--c-fail); font-variant-numeric: tabular-nums; }

  /* ── Sparkline hover tooltip (Status errors · Usage values) ── */
  .bar-tip { position: fixed; z-index: 80; transform: translate(-50%, calc(-100% - 8px)); max-width: 17rem; padding: .45rem .6rem; border-radius: var(--radius-md); background: var(--foreground); color: var(--background); box-shadow: var(--shadow-lg); pointer-events: none; }
  .bar-tip-title { font-size: .72rem; font-weight: 600; font-variant-numeric: tabular-nums; }
  .bar-tip-body { font-size: .72rem; opacity: .8; margin-top: .1rem; line-height: 1.35; }
  .bar-tip.fail { box-shadow: 0 0 0 1px color-mix(in oklch, var(--destructive) 55%, transparent), var(--shadow-lg); }
  .bar-tip.fail .bar-tip-title { color: #ff8b85; opacity: 1; }
  .bar-tip.fail .bar-tip-body { opacity: .95; }
  /* Per-namespace breakdown inside a tooltip */
  .tip-ns { display: flex; align-items: center; gap: .4rem; font-size: .72rem; margin-top: .15rem; }
  .tip-dot { width: .5rem; height: .5rem; border-radius: 2px; flex: 0 0 auto; }
  .tip-ns-name { font-family: var(--font-mono); opacity: .85; }
  .tip-ns-val { margin-left: auto; font-variant-numeric: tabular-nums; font-weight: 600; }
  .tip-total { display: block; margin-top: .35rem; padding-top: .3rem; border-top: 1px solid color-mix(in oklch, var(--background) 25%, transparent); font-size: .72rem; font-weight: 600; font-variant-numeric: tabular-nums; }

  /* ── KV namespace legend + stacked meter/sparkline ── */
  .kv-legend { display: flex; flex-wrap: wrap; gap: .35rem 1.1rem; margin-bottom: 1rem; }
  .kv-leg { display: inline-flex; align-items: center; gap: .4rem; font-size: .76rem; }
  .kv-leg-dot { width: .6rem; height: .6rem; border-radius: 2px; flex: 0 0 auto; }
  .kv-leg-name { font-family: var(--font-mono); color: var(--c-ink); }
  .kv-leg-note { font-size: .72rem; }
  .kv-bar { display: flex; height: .5rem; border-radius: 9999px; overflow: hidden; background: var(--muted); }
  .kv-seg { height: 100%; transition: opacity .12s; }
  .kv-seg:hover { opacity: .8; }
  .kv-seg + .kv-seg { box-shadow: inset 1px 0 0 var(--c-surface); }
  .kv-spark { height: 24px; align-items: flex-end; }
  .kv-spark .spark-col { display: flex; flex-direction: column-reverse; align-items: stretch; flex: 1 1 0; min-width: 0; border-radius: 1px; overflow: hidden; transition: opacity .12s; }
  .kv-spark .spark-col:hover { opacity: .7; }
  .kv-spark .spark-seg { width: 100%; }

  /* ── Data › Recipes ── */
  .recipe-toolbar { display: flex; gap: .75rem; align-items: center; margin-bottom: .5rem; }
  .recipe-search { flex: 1; display: flex; align-items: center; gap: .5rem; border: 1px solid var(--border); border-radius: var(--radius-md); padding: .4rem .7rem; background: var(--c-surface); }
  .recipe-search svg { color: var(--muted-foreground); flex: 0 0 auto; }
  .recipe-search:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 25%, transparent); }
  .recipe-search-input { flex: 1; border: 0; outline: 0; font: inherit; font-size: .9rem; background: none; color: var(--c-ink); }
  .recipe-search-clear { border: 0; background: none; cursor: pointer; color: var(--muted-foreground); display: flex; padding: 0; }
  .seg { display: inline-flex; background: var(--muted); border-radius: var(--radius-md); padding: 2px; gap: 2px; flex: 0 0 auto; }
  .seg-btn { border: 0; background: none; font: inherit; font-size: .82rem; padding: .3rem .75rem; border-radius: calc(var(--radius-md) - 2px); color: var(--muted-foreground); cursor: pointer; }
  .seg-btn.active { background: var(--c-surface); color: var(--c-ink); font-weight: 500; box-shadow: var(--shadow-xs); }
  .recipe-hint { margin: 0 0 1rem; }

  .recipe-list { gap: .5rem; }
  .recipe-item { background: var(--c-surface); cursor: pointer; transition: border-color .12s, background .12s; align-items: center; }
  .recipe-item > section { min-width: 0; }
  .recipe-item:hover { border-color: color-mix(in oklch, var(--accent) 45%, var(--border)); background: color-mix(in oklch, var(--muted) 30%, var(--c-surface)); }
  .recipe-item:focus-visible { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 30%, transparent); }
  .rdot { width: .6rem; height: .6rem; }
  .rtitle { font-weight: 500; color: var(--c-ink); }
  .rtitle .rsem { margin-left: .5rem; vertical-align: middle; }
  .rsem { font-size: .64rem; text-transform: uppercase; letter-spacing: .04em; color: var(--accent); border: 1px solid color-mix(in oklch, var(--accent) 40%, var(--border)); border-radius: 999px; padding: .02rem .4rem; font-weight: 600; display: inline-block; }
  .rsub { display: flex; flex-wrap: wrap; align-items: center; gap: .45rem; margin-top: .15rem; }
  .rslug { font-family: var(--font-mono); font-size: .78rem; color: var(--muted-foreground); }
  .rfacets { display: inline-flex; flex-wrap: wrap; gap: .3rem; }
  .rfacet { background: color-mix(in oklch, var(--muted) 55%, transparent); border: 1px solid var(--border); border-radius: 999px; padding: .05rem .45rem; font-size: .7rem; color: var(--c-mid); white-space: nowrap; }
  .ritem-trail { display: inline-flex; align-items: center; gap: .6rem; }
  .relbar { width: 3rem; height: .35rem; border-radius: 999px; background: var(--muted); overflow: hidden; }
  .relbar-fill { display: block; height: 100%; background: var(--accent); }
  .rchev { color: var(--c-faint); flex: 0 0 auto; }
  .pager { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-top: 1.25rem; }
  .pager-info { text-align: center; }

  /* ── Shared list footer (page-size selector + DS pagination) ── */
  .list-footer { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-top: 1.25rem; flex-wrap: wrap; }
  .lf-left { display: inline-flex; align-items: center; gap: 1.1rem; flex-wrap: wrap; }
  .lf-size { display: inline-flex; align-items: center; gap: .45rem; }
  .lf-size .select { width: auto; min-width: 4.2rem; }

  /* ── Flyer (Data › Flyer) ── */
  .fl-storebar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; margin-bottom: .9rem; }
  .fl-window { display: inline-flex; align-items: center; gap: .4rem; }
  .fl-statline { display: flex; align-items: center; gap: .55rem; flex-wrap: wrap; font-size: .82rem; color: var(--c-mid); margin: 0 0 1.1rem; }
  .fl-statline strong { color: var(--c-ink); font-weight: 600; }
  .fl-catsel { display: inline-flex; align-items: center; gap: .45rem; flex: 0 0 auto; }
  .fl-catsel .select { width: auto; min-width: 9rem; }

  .fl-item { align-items: center; }
  .fl-price { display: flex; flex-direction: column; align-items: flex-start; min-width: 3.4rem; line-height: 1.1; }
  .fl-sale-sm { font-weight: 600; font-size: .98rem; color: var(--c-ink); font-variant-numeric: tabular-nums; }
  .fl-was-sm { font-size: .72rem; color: var(--c-faint); text-decoration: line-through; font-variant-numeric: tabular-nums; }
  .fl-tag { font-size: .62rem; text-transform: uppercase; letter-spacing: .04em; font-weight: 700; padding: .05rem .4rem; border-radius: 999px; margin-left: .5rem; vertical-align: middle; background: color-mix(in oklch, var(--muted) 60%, transparent); border: 1px solid var(--border); color: var(--c-mid); }
  .fl-tag.hot { color: oklch(0.55 0.19 25); border-color: color-mix(in oklch, oklch(0.55 0.19 25) 45%, var(--border)); background: color-mix(in oklch, oklch(0.55 0.19 25) 10%, transparent); }
  .fl-match-chip { display: inline-flex; align-items: center; gap: .3rem; font-size: .7rem; color: var(--accent); border: 1px solid color-mix(in oklch, var(--accent) 40%, var(--border)); border-radius: 999px; padding: .05rem .45rem; font-weight: 500; white-space: nowrap; }
  .fl-match-chip svg { flex: 0 0 auto; }

  /* Flyer deal detail */
  .fl-hero { margin-bottom: .5rem; }
  .fl-hero-price { display: flex; align-items: baseline; gap: .7rem; }
  .fl-sale { font-size: 2rem; font-weight: 700; letter-spacing: -.02em; color: var(--c-ink); font-variant-numeric: tabular-nums; }
  .fl-was { font-size: 1.1rem; color: var(--c-faint); text-decoration: line-through; font-variant-numeric: tabular-nums; }
  .fl-unit { align-self: center; }
  .fl-hero-trail { display: flex; align-items: center; gap: .7rem; flex-wrap: wrap; margin-top: .7rem; }
  .fl-match { display: flex; flex-direction: column; gap: 1.1rem; }
  .fl-match-block { display: flex; flex-direction: column; gap: .5rem; }
  .fl-match-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; color: var(--c-soft); font-weight: 600; }
  .fl-members { display: flex; flex-direction: column; gap: .5rem; }
  .fl-member { display: grid; grid-template-columns: 8rem 1fr 2.6rem; align-items: center; gap: .7rem; }
  .fl-member-name { font-family: var(--font-mono); font-size: .82rem; color: var(--c-ink); }
  .fl-member .relbar { width: 100%; }
  .fl-recipes { display: flex; flex-direction: column; gap: .4rem; }
  .fl-recipe { display: flex; align-items: center; gap: .5rem; width: 100%; text-align: left; padding: .55rem .75rem; border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--c-surface); box-shadow: var(--shadow-xs); cursor: pointer; color: var(--c-ink); transition: border-color .12s, background .12s; }
  .fl-recipe:hover { border-color: color-mix(in oklch, var(--accent) 45%, var(--border)); background: color-mix(in oklch, var(--muted) 30%, var(--c-surface)); }
  .fl-recipe-slug { font-family: var(--font-mono); font-size: .82rem; flex: 1 1 auto; min-width: 0; }

  /* Recipe detail */
  .rd-back { margin-bottom: 1.1rem; white-space: nowrap; }
  .rd-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: 1rem; }
  .rd-title { font-size: 1.3rem; font-weight: 600; margin: 0; letter-spacing: -.01em; }
  .rd-slug { font-family: var(--font-mono); font-size: .82rem; color: var(--muted-foreground); margin-top: .25rem; }
  .rd-pipeline { padding: 1rem 1.1rem .8rem; border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--c-surface); box-shadow: var(--shadow-xs, 0 1px 2px rgba(0,0,0,.04)); }
  .rd-pipeline .pl-track { margin: 0; }
  .pl-subv { font-size: .8rem; font-weight: 500; color: var(--c-ink); white-space: nowrap; margin-top: .05rem; }
  .pl-stage.todo .pl-subv { color: var(--c-faint); font-weight: 400; }
  .pipe { display: inline-flex; align-items: center; gap: .45rem; }
  .pipe-k { font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; color: var(--muted-foreground); }
  .pipe-v { font-size: .82rem; font-weight: 500; }
  .rd-desc { margin: 0; font-size: .95rem; line-height: 1.55; color: var(--c-ink); }

  .md { font-size: .9rem; line-height: 1.6; color: var(--c-body); }
  .md > :first-child { margin-top: 0; }
  .md h2 { font-size: .95rem; font-weight: 600; margin: 1.1rem 0 .4rem; }
  .md ul, .md ol { margin: .3rem 0 .3rem 1.1rem; padding: 0; }
  .md li { margin: .15rem 0; }
  .md p { margin: .45rem 0; }
  .md code { font-family: var(--font-mono); font-size: .85em; background: var(--muted); padding: .05rem .3rem; border-radius: 4px; }

  .rd-notes { display: flex; flex-direction: column; gap: .6rem; }
  .rd-note { border: 1px solid var(--border); border-radius: var(--radius-lg); padding: .75rem .9rem; background: var(--c-surface); box-shadow: var(--shadow-xs); }
  .rd-note-head { display: flex; align-items: center; gap: .5rem; margin-bottom: .35rem; }
  .rd-note-author { font-family: var(--font-mono); font-size: .82rem; font-weight: 500; color: var(--c-ink); }
  .rd-note-time { margin-left: auto; }
  .rd-note-body { font-size: .86rem; color: var(--c-body); line-height: 1.5; }

  /* Pretty key/value (frontmatter · index row) */
  .pkv { display: flex; flex-direction: column; }
  .pkv-row { display: grid; grid-template-columns: 11rem 1fr; gap: 1rem; padding: .4rem 0; border-bottom: 1px solid var(--c-line); align-items: start; }
  .pkv-row:last-child { border-bottom: 0; }
  .pkv-k { font-family: var(--font-mono); font-size: .8rem; color: var(--muted-foreground); overflow-wrap: anywhere; }
  .pkv-v { font-size: .84rem; min-width: 0; }
  .pkv-nested { margin-top: .2rem; border: 1px solid var(--border); border-radius: var(--radius-md); padding: .1rem .6rem; background: color-mix(in oklch, var(--muted) 40%, transparent); }
  .pkv-nested .pkv-row { grid-template-columns: 7rem 1fr; padding: .3rem 0; }
  .pv-null { color: var(--c-faint); }
  .pv-bool { font-family: var(--font-mono); color: var(--c-ok); }
  .pv-num { font-family: var(--font-mono); }
  .pv-link { color: var(--accent); word-break: break-all; }
  .pv-chips { display: flex; flex-wrap: wrap; gap: .3rem; }
  .pv-chip { background: color-mix(in oklch, var(--muted) 60%, transparent); border: 1px solid var(--border); border-radius: 999px; padding: .05rem .5rem; font-size: .74rem; white-space: nowrap; }

  /* Collapsible raw markdown */
  .rd-raw { margin-top: 1.5rem; border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--c-surface); }
  .rd-raw summary { display: flex; align-items: center; gap: .5rem; padding: .7rem 1rem; cursor: pointer; font-size: .85rem; font-weight: 500; list-style: none; }
  .rd-raw summary::-webkit-details-marker { display: none; }
  .rd-raw-caret { transition: transform .15s; color: var(--muted-foreground); flex: 0 0 auto; }
  .rd-raw[open] .rd-raw-caret { transform: rotate(90deg); }
  .rd-raw summary .muted { margin-left: auto; font-family: var(--font-mono); }
  .rd-raw-pre { margin: 0; border-top: 1px solid var(--border); padding: 1rem; font-size: .78rem; background: var(--c-page); white-space: pre-wrap; word-break: break-word; font-family: var(--font-mono); line-height: 1.5; color: var(--c-body); }
  .stat-card-link { cursor: pointer; transition: border-color .15s, box-shadow .15s; }
  .stat-card-link:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); }
  .stat-card-link:focus-visible { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 35%, transparent); }
  .stat-go { margin-left: auto; color: var(--muted-foreground); opacity: 0; transform: translateX(-3px); transition: opacity .15s, transform .15s; }
  .stat-card-link:hover .stat-go, .stat-card-link:focus-visible .stat-go { opacity: 1; transform: translateX(0); color: var(--accent); }

  /* ── Members roster ── */
  .member-item { background: var(--c-surface); box-shadow: var(--shadow-xs); align-items: flex-start; }
  .member-item > figure { margin-top: .05rem; flex-shrink: 0; }
  .member-item > section { min-width: 0; }
  .member-item > aside { align-self: flex-start; margin-top: .15rem; flex-shrink: 0; }
  .member-name { display: inline-flex; align-items: center; gap: .5rem; font-weight: 500; color: var(--c-ink); white-space: nowrap; }
  .member-name .badge { text-transform: none; }
  .member-sub { color: var(--muted-foreground); font-size: .8rem; }
  .member-user { font-family: var(--font-mono); color: var(--c-ink); }
  .member-sub .dimsep { margin: 0 .4rem; opacity: .5; }
  .member-meta { font-size: .8rem; color: var(--muted-foreground); }
  .member-trail { display: inline-flex; align-items: center; gap: .5rem; }
  .member-trail .badge svg { margin-right: .15rem; }
  .member-flag { font-size: .74rem; }
  /* Member actions dropdown — keep labels on one line. */
  .member-trail .dropdown-menu > [data-popover] { min-width: 12rem; }
  .member-trail .dropdown-menu [role="menuitem"] { white-space: nowrap; }

  /* Roster header row (label + invite button) and clickable member rows. */
  .roster-head { display: flex; justify-content: space-between; align-items: center; }
  .member-item-link { cursor: pointer; transition: border-color .12s, background .12s; }
  .member-item-link:hover { border-color: color-mix(in oklch, var(--accent) 45%, var(--border)); background: color-mix(in oklch, var(--muted) 30%, var(--c-surface)); }
  .member-item-link:focus-visible { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 30%, transparent); }

  /* ── Member detail ── */
  .md-head { margin-bottom: 1rem; }
  .md-id { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
  .md-user { font-family: var(--font-mono); font-size: 1.25rem; font-weight: 600; color: var(--c-ink); }
  .md-id .badge svg { margin-right: .15rem; }
  .md-stats { margin-top: .45rem; }
  .member-detail .data-nav { margin-top: 1rem; }
  .md-pantry-name { display: inline-flex; align-items: center; gap: .5rem; }
  .md-flag { font-size: .66rem; color: var(--accent); border: 1px solid color-mix(in oklch, var(--accent) 40%, var(--border)); border-radius: 999px; padding: .02rem .4rem; }
  .md-lowflag { color: var(--c-warn); font-size: .8rem; }
  .md-log-title, .md-plan-title { font-weight: 500; color: var(--c-ink); }

  .md-plan { display: flex; flex-direction: column; gap: .5rem; }
  .md-plan-row { display: flex; align-items: baseline; gap: 1rem; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: .7rem .9rem; background: var(--c-surface); box-shadow: var(--shadow-xs); }
  .md-plan-day { font-family: var(--font-mono); font-size: .78rem; color: var(--muted-foreground); min-width: 6.5rem; flex: 0 0 auto; }
  .md-plan-recipe { display: flex; flex-direction: column; gap: .1rem; flex: 1; min-width: 0; }
  .md-plan-recipe .rslug { font-size: .74rem; }
  .md-plan-sides { color: var(--muted-foreground); font-size: .8rem; }

  .md-grocery { display: flex; flex-direction: column; gap: 1rem; }
  .md-store { border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--c-surface); overflow: hidden; box-shadow: var(--shadow-xs); }
  .md-store-head { padding: .5rem .9rem; font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--c-mid); background: color-mix(in oklch, var(--muted) 45%, transparent); border-bottom: 1px solid var(--c-line); }
  .md-gitem { display: flex; align-items: center; gap: .6rem; padding: .45rem .9rem; border-bottom: 1px solid var(--c-line); }
  .md-gitem:last-child { border-bottom: 0; }
  .md-gitem.checked .md-gname { text-decoration: line-through; color: var(--c-faint); }
  .md-check { color: var(--c-ok-dot); display: flex; flex: 0 0 auto; }
  .md-check-empty { width: 15px; height: 15px; border: 1.5px solid var(--c-faint); border-radius: 50%; display: inline-block; }
  .md-gname { flex: 1; font-size: .88rem; }

  .md-type { font-size: .7rem; padding: .05rem .45rem; border-radius: 999px; border: 1px solid; white-space: nowrap; }
  .md-type-cooked { color: var(--c-ok); border-color: var(--c-ok); }
  .md-type-takeout { color: var(--c-mid); border-color: var(--c-line2); }
  .md-type-leftovers { color: var(--c-warn); border-color: var(--c-warn); }
  .md-type-home { color: var(--c-mid); border-color: var(--c-line2); }
  .md-note-recipe { font-weight: 500; font-size: .85rem; color: var(--c-ink); }

  /* Member detail — recipe links, grounded grocery list */
  .md-recipe-link { background: none; border: 0; padding: 0; font: inherit; color: var(--accent); cursor: pointer; font-weight: 500; }
  .md-recipe-link:hover { text-decoration: underline; }
  .md-recipe-link.sm { font-weight: 400; font-family: var(--font-mono); font-size: .78rem; white-space: nowrap; }
  .md-prep { font-size: .82rem; color: var(--c-mid); }
  .md-grocery-list { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--c-surface); overflow: hidden; box-shadow: var(--shadow-xs); }
  .md-grocery-list .md-gitem { display: flex; align-items: flex-start; gap: .65rem; padding: .6rem .9rem; border-bottom: 1px solid var(--c-line); }
  .md-grocery-list .md-gitem:last-child { border-bottom: 0; }
  .md-gstatus { width: .5rem; height: .5rem; border-radius: 50%; background: var(--c-faint); flex: 0 0 auto; margin-top: .4rem; }
  .md-gstatus.in-cart { background: var(--accent); }
  .md-gmain { flex: 1; min-width: 0; }
  .md-gtop { display: flex; align-items: baseline; gap: .6rem; }
  .md-gname { font-size: .9rem; color: var(--c-ink); flex: 1; min-width: 0; }
  .md-gqty { flex: 0 0 auto; }
  .md-gsub { display: flex; flex-wrap: wrap; align-items: center; gap: .35rem .5rem; margin-top: .25rem; }
  .md-gfor .md-recipe-link.sm { color: var(--accent); }
  .md-incart { font-size: .64rem; text-transform: uppercase; letter-spacing: .04em; color: var(--accent); border: 1px solid color-mix(in oklch, var(--accent) 40%, var(--border)); border-radius: 999px; padding: .02rem .4rem; font-weight: 600; white-space: nowrap; flex: 0 0 auto; }

  /* ── Stores ── */
  .store-ico { display: inline-flex; color: var(--muted-foreground); }
  .store-ico svg { width: 20px; height: 20px; }
  .sku-code { font-family: var(--font-mono); font-size: .78rem; color: var(--c-mid); }
  .store-note-group { margin-bottom: 1.1rem; }
  .store-note-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; color: var(--c-soft); font-weight: 600; margin: 0 0 .5rem; }

  /* ── Guidance browser ── */
  .g-crumbs { display: flex; align-items: center; flex-wrap: wrap; gap: .25rem; margin-bottom: 1rem; }
  .g-crumb { background: none; border: 0; padding: 0; font: inherit; font-size: .85rem; color: var(--accent); cursor: pointer; font-family: var(--font-mono); }
  .g-crumb:hover { text-decoration: underline; }
  .g-crumb.current { color: var(--c-mid); cursor: default; }
  .g-crumb-sep { color: var(--c-faint); }
  .g-list { list-style: none; margin: 0; padding: 0; border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--c-surface); overflow: hidden; box-shadow: var(--shadow-xs); }
  .g-row { display: flex; align-items: center; gap: .7rem; padding: .7rem .9rem; border-bottom: 1px solid var(--c-line); cursor: pointer; transition: background .12s; }
  .g-row:last-child { border-bottom: 0; }
  .g-row:hover { background: color-mix(in oklch, var(--muted) 35%, var(--c-surface)); }
  .g-row:focus-visible { outline: none; background: color-mix(in oklch, var(--accent) 8%, var(--c-surface)); }
  .g-ico { display: inline-flex; flex: 0 0 auto; }
  .g-ico-dir { color: var(--accent); }
  .g-ico-file { color: var(--muted-foreground); }
  .g-name { flex: 1; font-size: .88rem; color: var(--c-ink); }
  .g-dir .g-name { font-weight: 500; }
  .g-meta { flex: 0 0 auto; }

  /* ── Logs (cron job runs) ── */
  .log-list { display: flex; flex-direction: column; gap: .4rem; }
  .log-entry { border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--c-surface); box-shadow: var(--shadow-xs); overflow: hidden; transition: box-shadow .2s, border-color .2s; }
  .log-entry.hl { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 30%, transparent); }
  .log-row { display: flex; align-items: center; gap: .7rem; width: 100%; background: none; border: 0; font: inherit; cursor: pointer; padding: .7rem .9rem; text-align: left; }
  .log-row:hover { background: color-mix(in oklch, var(--muted) 30%, var(--c-surface)); }
  .log-job { display: inline-flex; align-items: center; gap: .4rem; font-family: var(--font-mono); font-size: .85rem; color: var(--c-ink); min-width: 11rem; }
  .log-job svg { color: var(--muted-foreground); flex: 0 0 auto; }
  .log-outcome { font-size: .8rem; font-weight: 600; flex: 1; }
  .log-outcome.ok { color: var(--c-ok); }
  .log-outcome.fail { color: var(--c-fail); }
  .log-time { min-width: 5rem; text-align: right; }
  .log-dur { min-width: 4rem; text-align: right; font-variant-numeric: tabular-nums; }
  .log-caret { color: var(--muted-foreground); flex: 0 0 auto; transition: transform .15s; }
  .log-caret.up { transform: rotate(180deg); }
  .log-detail { padding: .2rem 1rem 1rem; border-top: 1px solid var(--c-line); }
  .log-meta { display: flex; flex-wrap: wrap; gap: .4rem 1.5rem; padding: .8rem 0; font-size: .85rem; }
  .log-summary-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; color: var(--c-soft); font-weight: 600; margin: 0 0 .4rem; }

  /* ── Discovery (candidate pipeline) ── */
  .stat-sub { font-size: .72rem; font-weight: 500; color: var(--muted-foreground); margin-top: .3rem; }
  .dc-filters { margin-bottom: 1.1rem; }
  .pill-count { margin-left: .35rem; font-variant-numeric: tabular-nums; opacity: .6; font-size: .78em; }
  .pill.active .pill-count { opacity: .8; }
  .pill:disabled { opacity: .4; cursor: not-allowed; }

  .dc-list { display: flex; flex-direction: column; gap: .7rem; }
  .dc-card { border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--c-surface); box-shadow: var(--shadow-xs); overflow: hidden; border-left: 3px solid var(--border); transition: box-shadow .15s; }
  .dc-card:hover { box-shadow: var(--shadow-sm); }
  .dc-card.kind-accepted { border-left-color: var(--c-ok-dot); }
  .dc-card.kind-dup, .dc-card.kind-reject, .dc-card.kind-defer { border-left-color: var(--c-warn-dot); }
  .dc-card.kind-park, .dc-card.kind-fail { border-left-color: var(--c-fail); }
  .dc-main { display: block; width: 100%; text-align: left; background: none; border: 0; font: inherit; cursor: pointer; padding: .85rem 1rem .35rem; }

  .dc-headrow { display: flex; align-items: center; gap: .6rem; }
  .dc-title { font-weight: 600; font-size: .98rem; color: var(--c-ink); flex: 1; min-width: 0; }
  .dc-headrow .badge { flex: 0 0 auto; }
  .dc-src { display: flex; align-items: center; gap: .4rem; margin-top: .25rem; font-size: .78rem; color: var(--muted-foreground); }
  .dc-src svg { color: var(--muted-foreground); flex: 0 0 auto; }
  .dc-src-name { font-weight: 500; color: var(--c-mid); }
  .dc-src .dimsep { opacity: .5; }
  .dc-url { font-family: var(--font-mono); font-size: .72rem; margin-left: auto; opacity: .7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* The pipeline progression track. */
  .pl-track { display: flex; align-items: flex-start; margin: .9rem 0 .2rem; padding: 0 .1rem; }
  .pl-stage { position: relative; display: flex; flex-direction: column; align-items: center; flex: 1 1 0; min-width: 0; gap: .3rem; }
  .pl-node { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--c-surface); border: 1.5px solid var(--border); color: var(--muted-foreground); position: relative; z-index: 1; transition: background .15s, border-color .15s; }
  .pl-stage.done .pl-node { background: var(--c-ok-bg); border-color: var(--c-ok-dot); color: var(--c-ok); }
  .pl-stage.todo .pl-node { border-style: dashed; color: var(--c-faint); }
  .pl-stage.halt .pl-node { background: var(--c-surface); }
  .pl-stage.halt.park .pl-node, .pl-stage.halt.fail .pl-node { border-color: var(--c-fail); color: var(--c-fail); background: var(--c-fail-bg); }
  .pl-stage.halt.dup .pl-node, .pl-stage.halt.reject .pl-node, .pl-stage.halt.defer .pl-node { border-color: var(--c-warn-dot); color: var(--c-warn); background: var(--c-warn-bg); }
  .pl-stage.halt .pl-node { box-shadow: 0 0 0 4px color-mix(in oklch, currentColor 12%, transparent); }
  .pl-label { font-size: .66rem; color: var(--muted-foreground); white-space: nowrap; letter-spacing: .01em; }
  .pl-stage.done .pl-label { color: var(--c-ok); }
  .pl-stage.halt .pl-label { color: var(--c-ink); font-weight: 600; }
  .pl-stage.todo .pl-label { color: var(--c-faint); }
  .pl-seg { position: absolute; top: 13px; left: 50%; width: 100%; height: 2px; background: var(--c-line2); z-index: 0; }
  .pl-seg.done { background: var(--c-ok-dot); }

  .dc-summary { font-size: .84rem; color: var(--c-body); margin: .55rem 0 .2rem; line-height: 1.5; }
  .rd-slug-link { background: none; border: 0; padding: 0; font: inherit; font-family: var(--font-mono); font-size: .92em; color: var(--accent); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }

  .dc-foot { display: flex; align-items: center; gap: .75rem; padding: .25rem 1rem .7rem; }
  .dc-retry { display: flex; align-items: center; gap: .7rem; flex-wrap: wrap; }
  .dc-retry-btn { gap: .3rem; }
  .dc-retry-state { display: inline-flex; align-items: center; gap: .35rem; }
  .dc-retry-state.ok { color: var(--c-ok); }
  .dc-terminal { font-style: italic; }
  .dc-expand { margin-left: auto; background: none; border: 0; font: inherit; font-size: .8rem; color: var(--muted-foreground); cursor: pointer; display: inline-flex; align-items: center; gap: .3rem; flex: 0 0 auto; }
  .dc-expand:hover { color: var(--c-ink); }
  .dc-expand svg { transition: transform .15s; }
  .dc-expand svg.up { transform: rotate(180deg); }
  .spin { animation: dc-spin 1s linear infinite; }
  @keyframes dc-spin { to { transform: rotate(360deg); } }

  .dc-detail { border-top: 1px solid var(--c-line); padding: .9rem 1rem 1rem; display: grid; grid-template-columns: 1fr; gap: 1rem; }
  .dc-stages { display: flex; flex-direction: column; gap: 0; }
  .dcs-row { display: flex; gap: .6rem; padding: .5rem 0; position: relative; }
  .dcs-row:not(:last-child)::before { content: ""; position: absolute; left: 9px; top: 1.7rem; bottom: -.3rem; width: 1.5px; background: var(--c-line); }
  .dcs-row.done:not(:last-child)::before { background: var(--c-ok-line); }
  .dcs-ico { flex: 0 0 auto; width: 19px; display: flex; justify-content: center; color: var(--muted-foreground); z-index: 1; }
  .dcs-row.done .dcs-ico { color: var(--c-ok); }
  .dcs-row.halt.park .dcs-ico, .dcs-row.halt.fail .dcs-ico { color: var(--c-fail); }
  .dcs-row.halt.dup .dcs-ico, .dcs-row.halt.reject .dcs-ico, .dcs-row.halt.defer .dcs-ico { color: var(--c-warn); }
  .dcs-row.todo { opacity: .55; }
  .dcs-name { font-size: .85rem; font-weight: 500; color: var(--c-ink); display: flex; align-items: center; gap: .5rem; }
  .dcs-tag { font-size: .64rem; text-transform: uppercase; letter-spacing: .04em; font-weight: 600; padding: .04rem .4rem; border-radius: 999px; }
  .dcs-tag.ok { background: var(--c-ok-bg); color: var(--c-ok); }
  .dcs-tag.halt { background: var(--c-warn-bg); color: var(--c-warn); }
  .dcs-tag.todo { background: var(--c-line); color: var(--c-faint); }
  .dcs-blurb { margin-top: .1rem; line-height: 1.4; }
  .dc-rawwrap { background: color-mix(in oklch, var(--muted) 30%, transparent); border: 1px solid var(--border); border-radius: var(--radius-md); padding: .8rem .9rem; }

  /* ── Config ── */
  .cfg-section { margin-bottom: 2rem; }
  .cfg-flash { animation: cfg-flash-anim 2.2s ease-out; border-radius: var(--radius-lg); }
  @keyframes cfg-flash-anim { 0%, 30% { box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 50%, transparent); } 100% { box-shadow: 0 0 0 3px transparent; } }
  .cfg-section-title { font-size: 1rem; font-weight: 600; color: var(--c-ink); margin: 0 0 .25rem; }
  .cfg-section-blurb { font-size: .84rem; line-height: 1.5; margin: 0 0 1rem; max-width: 46rem; }
  .cfg-help { line-height: 1.55; margin: 0 0 .9rem; max-width: 46rem; }
  .cfg-help strong { color: var(--c-body); font-weight: 600; }

  .knob-console { border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--c-surface); box-shadow: var(--shadow-xs); padding: 1.1rem 1.2rem; }
  .knob-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.1rem 1.8rem; }
  .knob { display: flex; flex-direction: column; gap: .4rem; }
  .knob-head { display: flex; align-items: center; justify-content: space-between; gap: .5rem; }
  .knob-label { font-size: .85rem; font-weight: 500; color: var(--c-ink); }
  .knob-value { display: flex; align-items: center; gap: .25rem; }
  .knob-input { width: 4.5rem; text-align: right; font-variant-numeric: tabular-nums; }
  .knob-unit { color: var(--muted-foreground); font-size: .82rem; }
  .knob .input[type="range"] { width: 100%; }
  .knob-help { line-height: 1.45; margin: 0; }
  .knob.below .knob-input { border-color: var(--c-fail); }
  .knob-floor { color: var(--c-fail); font-weight: 500; }

  .cfg-alert { margin: 1.1rem 0 0; }
  .cfg-actions { margin-top: 1.1rem; align-items: center; }
  .cfg-saved { display: inline-flex; align-items: center; gap: .3rem; color: var(--c-ok); }

  /* Analyze / Dry-run */
  .cfg-preview-actions { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; margin-top: 1.1rem; padding-top: 1rem; border-top: 1px dashed var(--border); }
  .cfg-preview-actions .muted { flex: 1; min-width: 12rem; }
  .cfg-result { margin-top: 1rem; border: 1px solid var(--border); border-radius: var(--radius-md); background: color-mix(in oklch, var(--muted) 25%, transparent); padding: .9rem 1rem; }
  .cfg-result-head { font-size: .82rem; font-weight: 600; color: var(--c-ink); margin: 0 0 .3rem; }
  .cfg-tau-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(8.5rem, 1fr)); gap: .5rem; margin-top: .7rem; }
  .cfg-tau { display: flex; flex-direction: column; gap: .1rem; background: var(--c-surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: .45rem .6rem; }
  .cfg-tau-name { font-family: var(--font-mono); font-size: .78rem; color: var(--c-mid); }
  .cfg-tau-count { font-size: 1.05rem; font-weight: 600; font-variant-numeric: tabular-nums; }
  .cfg-tau-count .muted { font-size: .72rem; font-weight: 400; }
  .cfg-cold { font-size: .66rem; color: var(--c-warn); }
  .cfg-dry { display: flex; flex-direction: column; gap: .3rem; margin-top: .6rem; }

  /* Corpus tables */
  .cfg-table-wrap { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--c-surface); box-shadow: var(--shadow-xs); }
  .cfg-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  .cfg-table thead th { text-align: left; font-size: .68rem; text-transform: uppercase; letter-spacing: .04em; color: var(--c-soft); font-weight: 600; padding: .55rem .8rem; background: color-mix(in oklch, var(--muted) 40%, transparent); border-bottom: 1px solid var(--border); }
  .cfg-table tbody td { padding: .55rem .8rem; border-bottom: 1px solid var(--c-line); vertical-align: middle; }
  .cfg-table tbody tr:last-child td { border-bottom: 0; }
  .cfg-mono { font-family: var(--font-mono); font-size: .82rem; }
  .cfg-canon { color: var(--c-mid); display: flex; align-items: center; gap: .3rem; }

  .cfg-num { font-variant-numeric: tabular-nums; }
  .cfg-feed { display: flex; flex-direction: column; gap: .05rem; }
  .cfg-feed-name { font-weight: 500; color: var(--c-ink); }

  .cfg-tags { display: inline-flex; flex-wrap: wrap; gap: .25rem; }

  .cfg-th-act { width: 1%; }
  .cfg-row-act { white-space: nowrap; text-align: right; }
  .cfg-mini { font: inherit; font-size: .76rem; background: var(--c-surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: .15rem .55rem; cursor: pointer; color: var(--c-body); margin-right: .4rem; }
  .cfg-mini:hover { border-color: var(--c-faint); }
  .cfg-probe { font-size: .74rem; margin-right: .5rem; }

  .cfg-remove { background: none; border: 0; cursor: pointer; color: var(--c-faint); padding: .25rem; border-radius: var(--radius-sm); vertical-align: middle; }
  .cfg-remove:hover { color: var(--c-fail); background: color-mix(in oklch, var(--destructive) 8%, transparent); }

  .cfg-add { margin-top: .9rem; background: var(--c-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-xs); padding: .85rem 1rem 1rem; }
  .cfg-add-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .04em; color: var(--c-soft); font-weight: 600; }
  .cfg-add-fields { display: flex; flex-wrap: wrap; align-items: center; gap: .5rem; margin-top: .4rem; }
  .cfg-add-wide { width: 18rem; max-width: 100%; }
