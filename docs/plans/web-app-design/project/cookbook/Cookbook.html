<!doctype html>
<html lang="en" data-accent="warm">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cookbook</title>
<link rel="stylesheet" href="ds/styles.css" />
<style>
  /* ============================================================================
     Cookbook — redesign on Basecoat. Single member-facing browse surface:
     index · in-place search · recipe page · similar · empty / 404.
     Layout is a calm, dense single column. Accent is themeable (warm orange to
     match the agent, or neutral Basecoat) via [data-accent] on <html>.
     ============================================================================ */

  /* Accent layer. Warm = the agent's #f4a259 brand; links lean to a deeper,
     readable orange. Neutral = pure Basecoat (links inherit foreground). */
  :root { --link: var(--foreground); --brand: var(--foreground); }
  html[data-accent="warm"] {
    --primary: #f4a259; --primary-foreground: #1a1a1a;
    --ring: #e8843f; --link: #c2410c; --brand: #b4552b;
  }
  html[data-accent="warm"].dark {
    --primary: #f4a259; --primary-foreground: #1a1a1a;
    --ring: #f4a259; --link: #fb923c; --brand: #fb923c;
  }
  html[data-accent="neutral"] { --link: var(--foreground); --brand: var(--foreground); }

  body { background: var(--background); }

  .wrap { max-width: 44rem; margin: 0 auto; padding: 1.25rem 1.5rem 5rem; }

  /* ── Floating theme toggle (stands alone, no header) ─────────────────── */
  .theme-fab.btn {
    position: fixed; top: 1rem; right: 1rem; z-index: 30;
    border-radius: 9999px;
    background: color-mix(in oklch, var(--background) 86%, transparent);
    backdrop-filter: blur(6px);
    box-shadow: var(--shadow-sm), 0 0 0 1px color-mix(in oklch, var(--foreground) 8%, transparent);
  }
  .theme-fab.btn:hover { background: var(--muted); }

  /* ── Search ──────────────────────────────────────────────────────────── */
  .lead { padding-top: 1.25rem; }
  .lead h1 { font-size: var(--text-3xl); letter-spacing: -0.02em; font-weight: 600; }
  .lead p { margin-top: 0.4rem; color: var(--muted-foreground); font-size: var(--text-base); }

  .searchbar { position: relative; margin: 1.5rem 0 0.5rem; }
  .searchbar > svg {
    position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%);
    width: 1.05rem; height: 1.05rem; color: var(--muted-foreground); pointer-events: none;
  }
  .searchbar input.input { height: 2.85rem; padding-left: 2.6rem; padding-right: 2.6rem; font-size: var(--text-base); border-radius: var(--radius-lg); }
  .search-clear {
    position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%);
    border: 0; background: transparent; color: var(--muted-foreground);
    width: 2rem; height: 2rem; border-radius: var(--radius-md); cursor: pointer;
    display: none; align-items: center; justify-content: center;
  }
  .search-clear svg { width: 1rem; height: 1rem; }
  .search-clear:hover { background: var(--muted); color: var(--foreground); }
  .searchbar[data-has-text="true"] .search-clear { display: flex; }

  .resultmeta { color: var(--muted-foreground); font-size: var(--text-sm); margin: 1.1rem 0 0.25rem; }
  .resultmeta strong { color: var(--foreground); font-weight: 500; }

  /* ── Recipe list (dense single column) ───────────────────────────────── */
  ul.recipes { list-style: none; margin: 0; padding: 0; }
  ul.recipes > li { border-bottom: 1px solid var(--border); }
  ul.recipes > li:first-child { border-top: 1px solid var(--border); }
  ul.recipes > li:last-child { border-bottom: 0; }

  .rrow {
    display: grid; grid-template-columns: 1fr auto; align-items: baseline;
    gap: 0.25rem 0.75rem; padding: 0.95rem 0.25rem; cursor: pointer;
    transition: background 0.12s;
  }
  .rrow:hover { background: color-mix(in oklch, var(--muted) 45%, transparent); }
  .rrow:focus-visible { outline: none; background: color-mix(in oklch, var(--muted) 55%, transparent); box-shadow: inset 2px 0 0 var(--ring); }
  .rtitle { font-size: var(--text-base); font-weight: 500; color: var(--foreground); letter-spacing: -0.01em; }
  .rrow:hover .rtitle { color: var(--link); }
  .rchev { color: var(--muted-foreground); opacity: 0; transform: translateX(-3px); transition: opacity 0.12s, transform 0.12s; align-self: center; }
  .rchev svg { width: 1rem; height: 1rem; display: block; }
  .rrow:hover .rchev, .rrow:focus-visible .rchev { opacity: 1; transform: translateX(0); }
  .rdesc { grid-column: 1; color: var(--muted-foreground); font-size: var(--text-sm); line-height: 1.5; max-width: 38rem; }
  .rfacets { grid-column: 1; display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.15rem; }

  .facet {
    display: inline-flex; align-items: center; height: 1.35rem; padding: 0 0.5rem;
    border-radius: 2rem; border: 1px solid var(--border);
    font-size: var(--text-xs); font-weight: 500; color: var(--muted-foreground);
    background: color-mix(in oklch, var(--muted) 40%, transparent);
    text-transform: capitalize; white-space: nowrap;
  }
  .facet[data-kind="protein"] {
    color: var(--brand);
    border-color: color-mix(in oklch, var(--primary) 45%, var(--border));
    background: color-mix(in oklch, var(--primary) 12%, transparent);
  }

  /* ── Recipe detail ───────────────────────────────────────────────────── */
  .backlink {
    display: inline-flex; align-items: center; gap: 0.35rem; margin-top: 1.75rem;
    color: var(--muted-foreground); font-size: var(--text-sm); cursor: pointer;
    background: none; border: 0; padding: 0; font-family: inherit; white-space: nowrap;
  }
  .backlink:hover { color: var(--foreground); }
  .backlink svg { width: 0.95rem; height: 0.95rem; }

  .detail h1 { font-size: var(--text-3xl); letter-spacing: -0.02em; font-weight: 600; margin-top: 1rem; }
  .detail-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; margin-top: 0.75rem; }
  .detail-time { display: inline-flex; align-items: center; gap: 0.3rem; color: var(--muted-foreground); font-size: var(--text-sm); white-space: nowrap; }
  .detail-time svg { width: 0.95rem; height: 0.95rem; }
  .detail-source { margin-top: 0.9rem; font-size: var(--text-sm); color: var(--muted-foreground); }
  .detail-source a { color: var(--link); text-decoration: underline; text-underline-offset: 2px; word-break: break-all; }

  .cook-cta { margin-top: 1.4rem; }
  .cook-cta svg { width: 1rem; height: 1rem; }

  /* Prose for the rendered recipe body */
  .prose { margin-top: 1.75rem; color: var(--foreground); font-size: var(--text-base); line-height: 1.7; }
  .prose h2 { font-size: var(--text-lg); font-weight: 600; letter-spacing: -0.01em; margin: 1.9rem 0 0.6rem; }
  .prose p { margin: 0 0 1rem; }
  .prose ul, .prose ol { margin: 0 0 1rem; padding-left: 1.3rem; }
  .prose li { margin: 0.3rem 0; }
  .prose ol li::marker { color: var(--brand); font-weight: 600; }
  .prose .cb-note { color: var(--muted-foreground); font-size: var(--text-sm); margin-top: 1.75rem; }

  .similar { margin-top: 2.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
  .similar h2 { font-size: var(--text-base); font-weight: 600; color: var(--foreground); margin-bottom: 0.25rem; }
  .similar ul.recipes > li:first-child { border-top: 0; }

  /* ── Member notes ────────────────────────────────────────────────────── */
  .notes { margin-top: 2.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
  .notes h2 { display: flex; align-items: center; gap: 0.5rem; font-size: var(--text-base); font-weight: 600; color: var(--foreground); }
  .note-count {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 1.3rem; height: 1.3rem; padding: 0 0.4rem; border-radius: 2rem;
    background: var(--muted); color: var(--muted-foreground);
    font-size: var(--text-xs); font-weight: 500;
  }
  .notes-sub { margin-top: 0.2rem; color: var(--muted-foreground); font-size: var(--text-sm); }
  .notelist { list-style: none; margin: 1.1rem 0 0; padding: 0; display: flex; flex-direction: column; gap: 1.1rem; }
  .note { display: grid; grid-template-columns: auto 1fr; gap: 0.75rem; }
  .note-avatar {
    width: 1.85rem; height: 1.85rem; flex: 0 0 auto; border-radius: 9999px;
    display: flex; align-items: center; justify-content: center;
    background: color-mix(in oklch, var(--primary) 16%, transparent); color: var(--brand);
    font-size: var(--text-xs); font-weight: 600; text-transform: uppercase;
  }
  .note-main { min-width: 0; }
  .note-head { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; }
  .note-author { font-size: var(--text-sm); font-weight: 500; color: var(--foreground); }
  .note-tag {
    display: inline-flex; align-items: center; height: 1.2rem; padding: 0 0.45rem;
    border-radius: 2rem; border: 1px solid color-mix(in oklch, var(--primary) 40%, var(--border));
    background: color-mix(in oklch, var(--primary) 10%, transparent); color: var(--brand);
    font-size: 0.68rem; font-weight: 500; text-transform: lowercase; letter-spacing: 0.01em;
  }
  .note-time { font-size: var(--text-xs); color: var(--muted-foreground); }
  .note-body { margin-top: 0.2rem; font-size: var(--text-sm); line-height: 1.55; color: color-mix(in oklch, var(--foreground) 88%, transparent); }

  /* ── Empty / 404 states ──────────────────────────────────────────────── */
  .state { margin-top: 3rem; }
  .state .empty { background: color-mix(in oklch, var(--muted) 25%, transparent); }
  .empty figure[data-accentfig] { background: color-mix(in oklch, var(--primary) 15%, transparent); color: var(--brand); }

  /* ── Footer ──────────────────────────────────────────────────────────── */
  .foot { margin-top: 2.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border); color: var(--muted-foreground); font-size: var(--text-xs); display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
  .foot .dot { opacity: 0.5; }

  /* ── Preview control (design aid, not part of the shipped page) ──────── */
  .preview { position: fixed; right: 1rem; bottom: 1rem; z-index: 60; font-size: var(--text-xs); }
  .preview-card {
    background: var(--popover); color: var(--popover-foreground);
    border-radius: var(--radius-lg); padding: 0.85rem 0.9rem;
    box-shadow: var(--shadow-lg), 0 0 0 1px color-mix(in oklch, var(--foreground) 10%, transparent);
    width: 14.5rem; display: none; flex-direction: column; gap: 0.7rem;
  }
  .preview.open .preview-card { display: flex; }
  .preview-toggle {
    margin-left: auto; display: flex; align-items: center; gap: 0.4rem;
    height: 2rem; padding: 0 0.75rem; border-radius: 2rem; cursor: pointer;
    border: 1px solid color-mix(in oklch, var(--foreground) 12%, transparent);
    background: var(--popover); color: var(--foreground);
    box-shadow: var(--shadow-md); font-family: inherit; font-size: var(--text-xs); font-weight: 500;
  }
  .preview.open .preview-toggle { display: none; }
  .preview-toggle svg { width: 0.85rem; height: 0.85rem; }
  .preview-head { display: flex; align-items: center; justify-content: space-between; }
  .preview-head h3 { font-size: var(--text-xs); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted-foreground); }
  .preview-close { border: 0; background: none; color: var(--muted-foreground); cursor: pointer; padding: 0.15rem; display: flex; }
  .preview-close svg { width: 0.9rem; height: 0.9rem; }
  .preview-close:hover { color: var(--foreground); }
  .pf-label { color: var(--muted-foreground); font-weight: 500; margin-bottom: 0.35rem; }
  .seg { display: inline-flex; padding: 2px; gap: 2px; border-radius: var(--radius-md); background: var(--muted); width: 100%; }
  .seg button {
    flex: 1; height: 1.85rem; border: 0; border-radius: calc(var(--radius-md) - 2px);
    background: transparent; color: color-mix(in oklch, var(--foreground) 62%, transparent);
    font-family: inherit; font-size: var(--text-xs); font-weight: 500; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 0.3rem;
  }
  .seg button svg { width: 0.85rem; height: 0.85rem; }
  .seg button[aria-pressed="true"] { background: var(--background); color: var(--foreground); box-shadow: var(--shadow-sm); }
  .preview-jump { display: flex; flex-wrap: wrap; gap: 0.35rem; }
  .preview-jump button {
    border: 1px solid var(--border); background: var(--background); color: var(--foreground);
    border-radius: var(--radius-sm); padding: 0.25rem 0.5rem; font-family: inherit;
    font-size: var(--text-xs); cursor: pointer;
  }
  .preview-jump button:hover { background: var(--muted); }
  .preview-note { color: var(--muted-foreground); line-height: 1.4; }

  @media (max-width: 560px) {
    .brand-tag { display: none; }
    .preview-card { width: 12.5rem; }
  }
</style>
</head>
<body>
  <button class="btn theme-fab" data-variant="ghost" data-size="icon" id="themeBtn" aria-label="Toggle dark mode" title="Toggle dark mode">
    <svg data-icon="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    <svg data-icon="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
  </button>

  <main class="wrap" id="app" data-comment-anchor="5dd8b35925-main"></main>

  <!-- Design-preview control. Not part of the shipped /cookbook page. -->
  <div class="preview" id="preview">
    <button class="preview-toggle" id="previewToggle" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
      Preview
    </button>
    <div class="preview-card">
      <div class="preview-head">
        <h3>Preview options</h3>
        <button class="preview-close" id="previewClose" aria-label="Close preview options">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div>
        <div class="pf-label">Accent</div>
        <div class="seg" id="segAccent">
          <button data-val="warm" aria-pressed="true">Warm orange</button>
          <button data-val="neutral" aria-pressed="false">Neutral</button>
        </div>
      </div>
      <div>
        <div class="pf-label">Appearance</div>
        <div class="seg" id="segTheme">
          <button data-val="light" aria-pressed="true">Light</button>
          <button data-val="dark" aria-pressed="false">Dark</button>
        </div>
      </div>
      <div>
        <div class="pf-label">Jump to state</div>
        <div class="preview-jump">
          <button data-go="#/">Index</button>
          <button data-go="#/search/unicorn%20stew">No results</button>
          <button data-go="#/empty">Empty</button>
          <button data-go="#/missing-recipe">404</button>
        </div>
      </div>
      <p class="preview-note">A design aid for reviewing the redesign. The shipped page keeps only the dark-mode toggle.</p>
    </div>
  </div>

  <script src="cookbook-data.js"></script>
  <script src="cookbook-app.js"></script>
</body>
</html>
