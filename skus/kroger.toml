# skus/kroger.toml — Kroger SKU cache (agent-maintained)
#
# Machine-maintained cache mapping canonical ingredient names to specific Kroger
# SKUs. The agent appends entries as the match_ingredient_to_kroger_sku pipeline
# resolves them; starts empty and grows with use. Reviewable as a flat list.
# See docs/SCHEMAS.md for the full schema.
#
# Example mappings (uncomment to illustrate shape; real entries are appended by
# the matching pipeline):
#
# [[mappings]]
# ingredient = "olive oil"
# sku = "0001111046025"
# brand = "Simple Truth Organic"
# size = "16.9 fl oz"
# last_used = "2025-05-15"
# reason = "preferred brand match; in stock at preferred location"
# ambiguity_resolved = false        # true if this required LLM fallback
#
# [[mappings]]
# ingredient = "chicken thighs"
# sku = "0001111091234"
# brand = "Kroger"
# size = "1.5 lb pack"
# last_used = "2025-05-14"
# reason = "default brand; best price-per-unit in deterministic narrowing"
# ambiguity_resolved = false

[[mappings]]
ingredient = "whole milk"
sku = "0001111040601"
brand = "Kroger"
size = "1/2 gal"

