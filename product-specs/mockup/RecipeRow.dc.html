<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/yamp-ui-76ffa1d0-b4bc-4e60-b696-ab3a7227af90/_ds_bundle.css">
  <link rel="stylesheet" href="_ds/yamp-ui-76ffa1d0-b4bc-4e60-b696-ab3a7227af90/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body { background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
  </style>
</helmet>
<li class="rrow" style="list-style:none; border-top:1px solid var(--border);">
  <button type="button" class="rrow-link" onClick="{{ row.goDetail }}" style="border:0; background:none; font:inherit; color:inherit; text-align:left; cursor:pointer; width:100%;">
    <sc-if value="{{ row.promoBadge }}" hint-placeholder-val="{{ false }}"><span class="rpromo" style="display:inline-flex; align-items:center; gap:0.3rem; font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:0.09em; text-transform:uppercase; color:var(--brand);">{{ row.promoBadge }}</span></sc-if>
    <span class="rtitle">{{ row.title }}</span>
    <sc-if value="{{ row.description }}" hint-placeholder-val="{{ true }}"><span class="rdesc">{{ row.description }}</span></sc-if>
    <span class="rfacets">
      <sc-for list="{{ row.facets }}" as="f" hint-placeholder-count="2"><span class="facet" data-kind="{{ f.kind }}">{{ f.label }}</span></sc-for>
      <sc-if value="{{ row.trendChip }}" hint-placeholder-val="{{ false }}"><span class="facet trend-chip">{{ row.trendChip }}</span></sc-if>
    </span>
  </button>
  <div class="rrow-actions">
    <button type="button" class="fav-btn{{ row.favOn }}" title="{{ row.favTitle }}" aria-pressed="{{ row.fav }}" onClick="{{ row.onFav }}">
      <sc-if value="{{ row.fav }}" hint-placeholder-val="{{ false }}"><svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z"></path></svg></sc-if>
      <sc-if value="{{ row.notFav }}" hint-placeholder-val="{{ true }}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z"></path></svg></sc-if>
    </button>
    <button type="button" class="plan-btn{{ row.planOn }}" title="{{ row.planTitle }}" aria-pressed="{{ row.planned }}" onClick="{{ row.onPlan }}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"></rect><path d="M16 2v4M8 2v4M3 10h18"></path></svg>
    </button>
  </div>
</li>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:640,&quot;height&quot;:76},&quot;row&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{ title: string; description?: string; facets: {kind:string;label:string}[]; trendChip?: string|null; fav: boolean; notFav: boolean; favOn: string; favTitle: string; planned: boolean; planOn: string; planTitle: string; goDetail: () =&gt; void; onFav: () =&gt; void; onPlan: () =&gt; void }&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const row = this.props.row || {
      title: 'Recipe title',
      description: 'A short description of the dish.',
      facets: [{ kind: 'protein', label: 'chicken' }, { kind: 'cuisine', label: 'thai' }],
      trendChip: null,
      fav: false, notFav: true, favOn: '', favTitle: 'Favorite',
      planned: false, planOn: '', planTitle: 'Add to meal plan', promoBadge: null,
      goDetail: () => {}, onFav: () => {}, onPlan: () => {},
    };
    return { row };
  }
}
</script>
</body>
</html>
