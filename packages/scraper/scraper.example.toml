# scraper.toml — the walled-source scraper's config for ONE machine on your home network.
#
# This machine holds ONE ingest key (supplied via the INGEST_API_KEY environment variable,
# NOT this file) and is configured with MANY sources. It authenticates to each paid site
# with YOUR OWN subscription session (captured out-of-band; see the README), extracts only
# the functional recipe facts, and POSTs them per-source to your grocery-mcp Worker.
#
# Copy this to <configDir>/scraper.toml (the mounted volume, default /config) and edit.

# Your grocery-mcp connector base URL. "/admin/api/ingest" is appended for the push.
connector_url = "https://grocery-mcp.<your-account>.workers.dev"

# Optional: a mounted directory of operator-authored adapter modules (loaded at runtime,
# no image rebuild). Each *.mjs/*.js/*.ts file default-exports a factory (sdk) => SourceAdapter,
# and its basename is the adapter name you reference below.
# adapters_dir = "/config/adapters"

# Optional: recurring cadence for `run --watch`. Accepts "30m", "6h", "1d", or bare ms.
schedule = "6h"

# --- sources ------------------------------------------------------------------
# Each [[sources]] is one paid source. The generic "jsonld" adapter needs no custom code:
# it discovers candidate URLs from a sitemap or feed and extracts recipes from the
# schema.org JSON-LD the authenticated pages carry.

# A plain-HTTP source: the default tier. The daemon replays your captured session cookies
# over HTTP and parses the returned HTML — no browser is launched for this source.
[[sources]]
id = "example-paid-http"
adapter = "jsonld"
fetch_tier = "http"                                     # the default; shown for clarity
sitemap_url = "https://paid-http.example/sitemap.xml"   # or feed_url = "…/feed.xml"
mode = "incremental"                                    # unseen-only each tick

# A browser-tier source: opt in only when a source needs a rendered DOM or a browser-only
# session. The daemon drives it through a single reused headless Chromium with a context
# built from this source's captured session. Chromium is pre-installed in the image.
[[sources]]
id = "example-paid-browser"
adapter = "jsonld"
fetch_tier = "browser"
feed_url = "https://paid-browser.example/rss.xml"
mode = "incremental"
