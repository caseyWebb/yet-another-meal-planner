# Example docker-compose for running the walled-source scraper on your home network.
#
# The image is built from the monorepo root (it vendors @grocery-agent/contract), so the
# build context is the repo root and the Dockerfile path is this package. Copy this to
# docker-compose.yml, put your config in ./config/scraper.toml, and set INGEST_API_KEY in
# your shell or a .env file next to this compose file.

services:
  scraper:
    build:
      # Build from the repo root so the workspace (contract + scraper) is in context.
      context: ../..
      dockerfile: packages/scraper/Dockerfile
    image: grocery-scraper:local
    environment:
      # The machine's single ingest key — mint it in the Worker's /admin panel. Never commit it.
      INGEST_API_KEY: ${INGEST_API_KEY:?set INGEST_API_KEY in your environment or a .env file}
      SCRAPER_CONFIG_DIR: /config
    volumes:
      # scraper.toml + sessions/ + state/ live here, read/written by the container.
      - ./config:/config
    # The default entrypoint runs `run --watch`. For a one-off tick, override the command:
    #   docker compose run --rm scraper run
    # For a dry-run of one URL (prints the item it WOULD push, no POST):
    #   docker compose run --rm scraper test example-paid-http https://paid.example/recipes/one
    # For a session import (from a storageState exported on your desktop):
    #   docker compose run --rm scraper cookie-import example-paid-http /config/exported-state.json
    command: ["run", "--watch"]
    restart: unless-stopped
