<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>grocery-agent admin</title>
    <script>
      // Pre-paint theme application (D10 — the member app's ThemeFab pattern): stamp `.dark`
      // on <html> before first paint so a dark-mode operator never sees a light flash.
      try {
        var t = localStorage.getItem("ga-theme");
        if (t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
